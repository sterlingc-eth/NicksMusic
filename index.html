08, the song takes time to build its contemplative atmosphere"],"tragedy_or_meaning":"\"i can't get high\" captures the devastating reality of anhedonia — when nothing brings pleasure anymore, when the things that once lifted you up no longer work. It's a painfully honest expression of emotional flatness that resonates with anyone who has struggled to feel alive, offering the comfort of being understood.","artwork_url":"","artist_origin":"USA","track_made_in":"USA"},{"id":81,"title":"Speak In Tongues","artist":"machineheart","album":"Cruel World EP","year":2017,"listens":85,"duration":"3:53","song_history":"\"Speak In Tongues\" was machineheart's second supporting single following their 2016 debut EP 'In Your Dreams.' Written by the full band alongside producer Dave Bassett, the track was released via Seeking Blue in 2017 and later included on their Cruel World EP.","artist_info":"machineheart is a synth-pop band formed in 2014 by vocalist Stevie Scott from Los Angeles and Tacoma, Washington natives Carman Kubanda (guitar), Jake Randle (bass), and Harrison Allen (drums). Their sound blends charismatic vocals with lush, edgy synth-pop soundscapes and infectious melodies.","artist_history":"The band emerged in 2015 with the breakout single 'Circles' from their Columbia Records-issued 'In Your Dreams' EP. After signing with Nettwerk Records, they released their full-length debut 'People Change' in 2019, building a devoted indie-electronic fanbase along the way.","cool_facts":["The band members from Tacoma had been in bands together since they were teenagers before moving to LA","Their single 'Speak In Tongues' helped land them a deal with Nettwerk Records","Founded in Washington State, the band's indie-electronic style draws from synth-pop soundscapes and infectious lyrical styles"],"tragedy_or_meaning":"\"Speak In Tongues\" explores themes of spiritual connection and the feeling of being overwhelmed by forces beyond your control. The song captures that moment when words fail and raw emotion takes over, resonating with anyone who's felt the power of something they can't quite articulate.","artwork_url":"","artist_origin":"Los Angeles, California, USA","track_made_in":"Los Angeles, California, USA"},{"id":82,"title":"Photomaton","artist":"Jabberwocky","album":"Photomaton Single","year":2014,"listens":84,"duration":"4:40","song_history":"\"Photomaton\" featuring vocals by Elodie Wildstars became a massive hit in France, reaching number 2 on the French singles chart. The track showcased the trio's ability to craft infectious electronic pop while still in their early twenties.","artist_info":"Jabberwocky is a French electronic music trio formed in 2013 by Camille Camara, Simon Pasquer, and Emmanuel Bretou, all originating from Poitiers, France. Their sound blends indie-electronic production with dreamy vocals and dance-floor energy.","artist_history":"Remarkably, all three producers were still studying medicine when they formed the group. Despite their academic commitments, they achieved mainstream success with 'Photomaton' becoming a number 2 hit in France, proving that creative passion and academic excellence can coexist.","cool_facts":["All three members were medical students when they formed the band","The song reached number 2 on the French singles chart","They all originated from the same city of Poitiers, France"],"tragedy_or_meaning":"\"Photomaton\" (French for 'photo booth') evokes the fleeting, captured moments of youth and spontaneity. The song's hypnotic groove and Elodie Wildstars' ethereal vocals create a sense of being frozen in a beautiful moment, making it a celebration of living in the present.","artwork_url":"","artist_origin":"Poitiers, France","track_made_in":"Paris, France"},{"id":83,"title":"Alright","artist":"SoLonely","album":"Single","year":2019,"listens":83,"duration":"3:20","song_history":"\"Alright\" was written and self-released by the independent artist SoLonely as a standalone single. The track represe ight session","The iconic 'eeh err' sound was added spontaneously after the song was already finished","It topped the Billboard Hot 100 for 11 consecutive weeks and is Diamond-certified","Producer 30 Roc made the beat during a heatwave when his AC broke"],"tragedy_or_meaning":"\"The Box\" represents the magic of creative spontaneity — a song that almost didn't exist, made in minutes with a sound effect added on a whim, becoming one of the biggest hits of its era. It's a testament to trusting your instincts and the power of authentic artistic impulse.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/1/15/Zerb_-_Mwaki.png","artist_origin":"Compton, California, USA","track_made_in":"New York, USA"},{"id":98,"title":"In Between","artist":"Anton F","album":"Single","year":2019,"listens":75,"duration":"3:05","song_history":"\"In Between\" is a track by the independent producer Anton F, exploring the emotional territory of transition and uncertainty. The production balances atmospheric textures with forward-moving energy.","artist_info":"Anton F is an independent electronic music producer whose sound combines atmospheric textures with emotive melodies and modern production techniques. Their work occupies the space between ambient and dance-oriented electronic music.","artist_history":"Operating as an independent artist, Anton F has built their catalog through self-released productions that find audiences through streaming platforms and electronic music communities.","cool_facts":["The title 'In Between' captures the feeling of being in transition","The track blends atmospheric and dance-oriented electronic elements","The artist connects with listeners through emotionally resonant electronic production"],"tragedy_or_meaning":"\"In Between\" captures the uncomfortable beauty of transition — those moments when you're no longer who you were but not yet who you'll become. The song resonates with anyone navigating uncertainty, finding peace in the liminal space between eakable. The metaphor of thin glass captures how easily trust and connection can shatter, speaking to anyone who's held something precious while knowing how delicate it really is.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/1/16/Eminem_-_Curtain_Call_2.png","artist_origin":"Boulder, Colorado, USA","track_made_in":"Boulder, Colorado, USA"},{"id":102,"title":"Drown","artist":"Enzo","album":"Single","year":2020,"listens":74,"duration":"2:25","song_history":"\"Drown\" is a track by the electronic producer Enzo (also credited as Enzore), released through independent channels. The song captures the feeling of being overwhelmed through its atmospheric electronic production.","artist_info":"Enzo is an electronic music producer working in the atmospheric and dark electronic space. Their sound combines deep textures with emotive melodies that create immersive sonic experiences.","artist_history":"As an independent electronic producer, Enzo has released music through labels like Endogenic Noise Records, building a catalog of atmospheric electronic tracks that explore emotional depth through sound design.","cool_facts":["The track's compact 2:25 runtime creates an intense, focused emotional experience","Enzo works in the atmospheric electronic music space","The song title 'Drown' captures the overwhelming nature of deep emotion"],"tragedy_or_meaning":"\"Drown\" captures the sensation of being submerged by emotion — whether it's love, grief, or anxiety. The brief track creates an immersive experience that mirrors how overwhelming feelings can wash over you completely, making every second feel like an eternity.","artwork_url":"","artist_origin":"USA","track_made_in":"USA"},{"id":103,"title":"Let Me Go","artist":"Duke Dumont","album":"Duality","year":2020,"listens":74,"duration":"6:06","song_history":"\"Let Me Go\" was released on April 3, 2020 featuring Australian singer-songwriter RY X, as a single from Duke Dumont's debut album 'Duality.' The track features real s g fired from his job because he spent all his time updating his profile. This dedication paid off when he became one of house music's most successful crossover artists, with multiple UK number 1 singles and international acclaim.","cool_facts":["Duke Dumont got fired from his job for spending too much time on MySpace promoting his music","The song features Niia, an American singer known for her soulful, atmospheric style","The lyrics 'I'm in love with fear' explore the paradox of being attracted to what scares us"],"tragedy_or_meaning":"\"The Fear\" explores the strange human tendency to be drawn toward what frightens us. The repeated declaration 'I'm in love with fear, but you will never hold me' speaks to the courage of feeling fear fully without letting it control you — a powerful message for anyone facing their anxieties.","artwork_url":"","artist_origin":"London, England, UK","track_made_in":"London, England, UK"},{"id":110,"title":"Hallucinogenics","artist":"Matt Maeson","album":"Bank on the Funeral","year":2018,"listens":71,"duration":"3:49","song_history":"\"Hallucinogenics\" was released with its official video on March 30, 2018 and later appeared on Matt Maeson's debut album 'Bank on the Funeral' (2019). The song recounts a particularly dark period after touring and later topped the Billboard Alternative Songs chart in 2020.","artist_info":"Matt Maeson is a Virginia-born, Nashville-based singer-songwriter who makes modern bluesy indie-folk. He's known for transforming complicated feelings and self-doubt into arrestingly catchy alternative anthems anchored by raw emotion.","artist_history":"Growing up in Virginia, Maeson got his start performing for inmates at maximum-security prisons at age 17. His 2016 debut single 'Cringe' hit number 1 on Billboard's Alternative Songs chart, and 'Hallucinogenics' later achieved the same feat, with a remix featuring Lana Del Rey expanding its reach.","cool_facts":["Matt Maeson began performing at maximum-security prisons piness.","artwork_url":"","artist_origin":"Grapevine, Texas, USA","track_made_in":"Los Angeles, California, USA"},{"id":112,"title":"Slow Burn","artist":"Moksi","album":"The Return of House Music","year":2019,"listens":71,"duration":"4:04","song_history":"\"Slow Burn\" featuring vocalist Elayna Boynton was released by Moksi as part of their album 'The Return of House Music.' The track showcases the duo's ability to blend deep, soulful vocals with their signature bass-heavy production.","artist_info":"Moksi is a Dutch electronic production duo consisting of Samir and Diego, who deliver bass-heavy electronic dance music inspired by late-'90s UK garage. They met at a house party and joined forces, catching the attention of fellow Dutch duo Yellow Claw.","artist_history":"After releasing their debut track 'Getting Higher,' which attracted Yellow Claw's attention, Moksi rapidly ascended to playing their first-ever DJ gig at Tomorrowland in 2015. Their sound draws from 90s UK garage classics, dubstep, and fidget house.","cool_facts":["Moksi played their very first DJ gig at Tomorrowland festival in 2015","The duo met at a house party before forming their musical partnership","Their sound is inspired by late-'90s UK garage and early 2000s fidget house"],"tragedy_or_meaning":"\"Slow Burn\" captures the gradual intensity of growing desire — emotions that build slowly rather than exploding all at once. Elayna Boynton's soulful vocals over Moksi's deep production create a sense of patient, building tension that mirrors how the most meaningful feelings take time to develop.","artwork_url":"","artist_origin":"Netherlands","track_made_in":"Netherlands"},{"id":113,"title":"Already Broken","artist":"Levi Bloom","album":"Already Broken Single","year":2022,"listens":71,"duration":"3:10","song_history":"\"Already Broken\" was released by Levi Bloom on April 20, 2022 as a single. The track continues the artist's exploration of emotional vulnerability and personal struggle through atmospheric alternative production.","artist_info":"Levi Bloom (Levi Tyler Bloom) is an independent singer-songwriter and producer working in the alternative and indie music space. His sound blends emotional vulnerability with atmospheric production and honest lyricism.","artist_history":"Levi Bloom has been releasing music since 2019 with tracks like 'On My Way,' building a catalog that spans introspective ballads and emotionally charged alternative productions. His work connects with listeners through raw authenticity and relatable themes of struggle and growth.","cool_facts":["Levi Bloom has been consistently releasing music since 2019","He handles his own songwriting and production","His catalog spans themes from hope ('On My Way') to vulnerability ('Already Broken')"],"tragedy_or_meaning":"\"Already Broken\" speaks to the paradoxical freedom of having nothing left to lose. When you've already been shattered, there's no more fear of breaking — the song captures that strange liberation of rock bottom, where vulnerability becomes its own form of strength.","artwork_url":"","artist_origin":"Kentucky, USA","track_made_in":"Kentucky, USA"},{"id":114,"title":"Let You Go (A-Trak Remix)","artist":"The Chainsmokers","album":"Let You Go (A-Trak Remix) Single","year":2015,"listens":70,"duration":"4:27","song_history":"Released in June 2015, A-Trak's remix of The Chainsmokers' 'Let You Go' (featuring Great Good Fine Ok) transformed the progressive house original into a high-energy dance floor weapon. The remix was released through Dim Mak and Republic Records.","artist_info":"The Chainsmokers (Alex Pall and Drew Taggart) are an American electronic DJ and production duo who mix indie, dance, and pop. A-Trak (Alain Macklovitch) is a Canadian DJ who won the DMC World DJ Championship at age 15.","artist_history":"The Chainsmokers broke through in 2014 with '#Selfie' before dominating charts with 'Roses' and 'Closer.' A-Trak became the youngest DMC World Champion at 15, later touring "listens":70,"duration":"3:28","song_history":"Released on April 1, 2016, Mt. Eden's remix of Glades' 'Drive' took the Sydney trio's dreamy indie-pop original and infused it with the New Zealand producer's signature downtempo electronic production, creating a hypnotic fusion of both artists' styles.","artist_info":"Glades is a Sydney-based Australian indie-pop trio who make electro-pop that's reflective and atmospheric. Mt. Eden is a New Zealand electronic artist (Jesse Cooper) known for pioneering dubstep, named after their hometown of Mt. Eden, Auckland.","artist_history":"Glades formed in 2015 and signed with a major label, releasing their debut LP 'To Love You' in 2018. Mt. Eden burst onto the scene in 2009 when their track 'Sierra Leone' went viral, making them international pioneers of melodic dubstep from New Zealand.","cool_facts":["Mt. Eden's 'Sierra Leone' was one of the first dubstep tracks to go truly viral internationally","Glades are described as documenting 'romantic turbulence with dreamy acuity'","Mt. Eden began producing music from his bedroom as a teenager before 'bedroom producer' was a common term"],"tragedy_or_meaning":"The Mt. Eden Remix of 'Drive' transforms the original's indie-pop intimacy into something more expansive and emotionally vast. The dubstep-influenced production adds weight and depth to themes of movement and escape, creating a journey that feels both introspective and epic.","artwork_url":"","artist_origin":"Sydney, Australia","track_made_in":"Sydney, Australia"},{"id":118,"title":"Faithfully","artist":"Journey","album":"Frontiers","year":1983,"listens":69,"duration":"4:27","song_history":"Written by keyboardist Jonathan Cain, \"Faithfully\" came to him supernaturally fast — he said the melody came from a dream. The song describes the difficulties of maintaining love while constantly touring, inspired by Cain's troubled relationship with his first wife TanÃ©.","artist_info":"Journey is an American rock band formed in 1973 in San Francisco, known for their soaring arena rock anthems. With Steve Perry on vocals, they became one of the most successful bands of the late 1970s and 1980s.","artist_history":"Journey's streak of crossover hits stretched from 1979's 'Lovin', Touchin', Squeezin'' through the massive 'Frontiers' album. 'Faithfully' followed the number 1 rock hit 'Separate Ways' and became one of their most enduring ballads, covered and referenced in pop culture for decades.","cool_facts":["Jonathan Cain said the song came to him from a dream and was 'anointed, supernatural'","Ironically, Cain and his wife Tané divorced a few years after he pledged to be 'forever yours, faithfully'","Neal Schon commented on the song's genesis: 'He told me he got the melody out of a dream. I wish something like that would happen to me'"],"tragedy_or_meaning":"\"Faithfully\" captures the brutal reality of touring musicians trying to keep love alive across thousands of miles. The song's poignancy deepens knowing that Cain's marriage didn't survive despite his pledge — making it both a beautiful promise and a heartbreaking artifact of love that couldn't overcome distance.","artwork_url":"","artist_origin":"San Francisco, California, USA","track_made_in":"San Francisco, California, USA"},{"id":119,"title":"Let Me In","artist":"Rezz","album":"Spiral","year":2021,"listens":69,"duration":"3:28","song_history":"\"Let Me In\" was released on October 1, 2021 as part of Rezz's album 'Spiral,' featuring vocalist fknsyd. The spine-chilling midtempo track features a haunting topline that perfectly complements Rezz's dark, hypnotic production style.","artist_info":"Rezz (Isabelle Rezazadeh) is a Ukrainian-Canadian DJ and producer from Niagara Falls, Ontario. Her sinister and hypnotic creations are spellbinding fusions of dark techno and abrasive industrial, earning her the nickname 'Space Mom' from devoted fans.","artist_history":"Born in Ukraine to a Ukrainian mother and Iranian father, Rezz moved to Canada as a child. Inspired by Deadmau5, she began making music and released her debut EP through Owsla's subsidiary Nest HQ in 2015. She's since released four studio albums and become one of electronic music's most distinctive voices.","cool_facts":["Rezz became the youngest female DJ to win an Electronic/Dance Album of the Year Juno Award","She was heavily inspired by Deadmau5 and later collaborated with him as 'Rezzmau5'","Her fans call themselves 'The Cult' and she's nicknamed 'Space Mom'"],"tragedy_or_meaning":"\"Let Me In\" pairs fknsyd's haunting vocals with Rezz's dark production to create a song about desperate longing for connection. The 'let me in' plea takes on an eerie quality — it could be romantic desire or something more sinister, leaving listeners in that delicious state of uncertainty.","artwork_url":"","artist_origin":"Niagara Falls, Ontario, Canada","track_made_in":"Niagara Falls, Ontario, Canada"},{"id":120,"title":"Paris","artist":"Else","album":"Paris Single","year":2016,"listens":68,"duration":"3:08","song_history":"\"Paris\" was released on April 19, 2016 by the French electro duo Else, part of L'Ordre Collectif artist collective. The track became their signature song, capturing the romantic energy of the city through pulsing electronic production.","artist_info":"Else is a French electronic music duo known for their atmospheric, club-ready productions. They are part of L'Ordre Collectif, a French artist collective that fosters experimental electronic music.","artist_history":"Emerging from the French electronic music scene, Else built their reputation through their iconic track 'Paris' and subsequent releases. Their work bridges the gap between underground club culture and accessible electronic pop.","cool_facts":["Else is part of L'Ordre Collectif, a French artist collective","The track has been remixed multiple times, including a Thoj Edit and Sugarbus Remix","The song is widely considered their signature track"],"tragedy_or_meaning":"\"Paris\" capture , USA","track_made_in":"Los Angeles, California, USA"}];

<script>
/* ===== Animated neon background (mouse + particles + grooves) ===== */
(function(){
  const c=document.getElementById('bgCanvas'),x=c.getContext('2d');
  const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  let W,H,DPR;
  function resize(){DPR=Math.min(devicePixelRatio||1,2);W=c.width=innerWidth*DPR;H=c.height=innerHeight*DPR;
    c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';}
  resize();addEventListener('resize',resize);
  const m={x:innerWidth/2,y:innerHeight/2,tx:innerWidth/2,ty:innerHeight/2};
  addEventListener('mousemove',e=>{m.tx=e.clientX;m.ty=e.clientY;},{passive:true});
  const COUNT=reduce?0:Math.round(innerWidth*innerHeight/9000); // denser starfield
  const cols=[[180,230,255],[0,240,255],[255,43,214],[157,78,255],[255,255,255]];const P=[];
  for(let i=0;i<COUNT;i++)P.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.1,vy:(Math.random()-.5)*.1,
    r:Math.random()*1.6+.4, c:cols[Math.floor(Math.random()*cols.length)],
    ph:Math.random()*6.28, sp:.5+Math.random()*1.4,
    spark:Math.random()<0.18}); // ~18% are sparkle-stars with cross glints
  let t=0;
  function radial(px,py,rad,col,a){const g=x.createRadialGradient(px,py,0,px,py,rad);
    g.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${a})`);g.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
    x.fillStyle=g;x.fillRect(0,0,innerWidth,innerHeight);}
  function frame(){t+=.006;m.x+=(m.tx-m.x)*.06;m.y+=(m.ty-m.y)*.06;
    const E=(window.NEON&&NEON.energy)||{bass:0,level:0};
    x.clearRect(0,0,W,H);x.save();x.scale(DPR,DPR);
    const cx=innerWidth*0.5+(m.x-innerWidth/2)*0.03, cy=innerHeight*0.5+(m.y-innerHeight/2)*0.03;
    // grooves radiating from center — react to bass
    for(let r=70;r<Math.max(innerWidth,innerHeight)*0.9;r+=44){
      const pulse=Math.sin(t*1.2-r*0.006)*0.5+0.5;
      x.beginPath();x.arc(cx,cy,r+E.bass*40,0,6.2832);
      x.strokeStyle=`rgba(0,240,255,${0.010+pulse*0.016+E.bass*0.02})`;x.lineWidth=1;x.stroke();
    }
    const breath=Math.sin(t*0.9)*0.5+0.5;
    radial(cx,cy,300+breath*120+E.level*120,[0,240,255],0.09+breath*0.04+E.level*0.06);
    radial(innerWidth-cx*0.5,innerHeight-cy*0.4,320,[255,43,214],0.07);
    radial(innerWidth*0.5,innerHeight*0.6,300,[157,78,255],0.05);
    for(const p of P){
      const dx=m.x-p.x,dy=m.y-p.y,d=Math.hypot(dx,dy)||1;
      // strong mouse attraction — stars stream toward the cursor
      if(d<520){const pull=(1-d/520)*0.06;p.vx+=dx/d*pull;p.vy+=dy/d*pull;}
      p.vx*=0.93;p.vy*=0.93;p.x+=p.vx;p.y+=p.vy;
      if(p.x<-10)p.x=innerWidth+10;if(p.x>innerWidth+10)p.x=-10;
      if(p.y<-10)p.y=innerHeight+10;if(p.y>innerHeight+10)p.y=-10;
      const tw=Math.sin(t*5*p.sp+p.ph)*0.5+0.5;       // twinkle
      const a=0.2+tw*0.7+E.level*0.25;
      const rad=p.r+E.level*1.2+tw*0.4;
      const col=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${a})`;
      x.fillStyle=col;x.shadowColor=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},.95)`;x.shadowBlur=6+tw*10;
      x.beginPath();x.arc(p.x,p.y,rad,0,6.2832);x.fill();
      // sparkle stars get a cross-glint that pulses with the twinkle
      if(p.spark){
        const gl=(rad+2)*(1.4+tw*1.6);
        x.strokeStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${0.4+tw*0.5})`;x.lineWidth=0.8;
        x.beginPath();
        x.moveTo(p.x-gl,p.y);x.lineTo(p.x+gl,p.y);
        x.moveTo(p.x,p.y-gl);x.lineTo(p.x,p.y+gl);
        x.stroke();
      }
      x.shadowBlur=0;
    }
    x.restore();requestAnimationFrame(frame);}
  if(reduce){x.save();x.scale(DPR,DPR);radial(innerWidth*0.5,innerHeight*0.5,400,[0,240,255],.10);x.restore();}
  else requestAnimationFrame(frame);
})();

/* ===== NEON: generative audio engine + reactive visualizer =====
   - Synthesizes a deterministic ~20s loop per track (seeded by title)
   - Mood (scale/tempo/timbre) derived from song metadata keywords
   - Live AnalyserNode drives bars + sabers + alien pulses + breathing ring
   - Real song audio is offered separately via the official Spotify embed */
const NEON=(function(){
  let ctx=null,master=null,analyser=null,freqData=null,timeData=null;
  let playing=false,raf=null,song=null,startT=0,DUR=20,stopAt=0;
  let nodes=[];
  // expose live energy for the breathing ring
  const energy={bass:0,mid:0,treble:0,level:0};

  const SCALES={
    minor:[0,2,3,5,7,8,10], dorian:[0,2,3,5,7,9,10],
    phrygian:[0,1,3,5,7,8,10], major:[0,2,4,5,7,9,11],
    lydian:[0,2,4,6,7,9,11], pent:[0,3,5,7,10]
  };
  function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
  function rng(seed){let s=seed>>>0;return()=>{s^=s<<13;s^=s>>>17;s^=s<<5;s>>>=0;return s/4294967296;};}

  // Build a mood profile from the song's text
  function profile(s){
    const text=((s.tragedy_or_meaning||'')+' '+(s.song_history||'')+' '+(s.album||'')+' '+s.title).toLowerCase();
    const has=w=>text.includes(w);
    const seed=hash(s.title+s.artist);const r=rng(seed);
    // base category
    let mood={scale:'minor',tempo:96,wave:'sawtooth',bright:0.5,drive:0.4,airy:0.4,name:'synthwave'};
    if(has('dark')||has('horror')||has('death')||has('grave')||has('demons')||has('beast')||has('rage')||has('fire')||has('overdose')||has('numb')||has('shadow')||has('grim')){
      mood={scale:'phrygian',tempo:100,wave:'sawtooth',bright:0.32,drive:0.85,airy:0.22,name:'dark'};
    } else if(has('float')||has('dream')||has('ambient')||has('ethereal')||has('weightless')||has('lo-fi')||has('chill')||has('peace')||has('calm')||has('healing')||has('meditat')||has('drift')){
      mood={scale:'lydian',tempo:72,wave:'sine',bright:0.72,drive:0.18,airy:0.88,name:'ambient'};
    } else if(has('joy')||has('dance')||has('euphor')||has('celebrat')||has('party')||has('high')||has('alegr')||has('upbeat')||has('infectious')||has('festival')||has('club')){
      mood={scale:'major',tempo:120,wave:'square',bright:0.82,drive:0.55,airy:0.38,name:'euphoric'};
    } else if(has('grief')||has('loss')||has('sad')||has('lonely')||has('heartbreak')||has('tragedy')||has('tears')||has('goodbye')||has('alone')||has('cry')){
      mood={scale:'dorian',tempo:80,wave:'triangle',bright:0.45,drive:0.3,airy:0.62,name:'melancholy'};
    } else if(has('rap')||has('drill')||has('trap')||has('hip-hop')||has('hip hop')||has('rock')||has('metal')||has('punk')){
      mood={scale:'minor',tempo:90,wave:'sawtooth',bright:0.5,drive:0.7,airy:0.3,name:'heavy'};
    }
    // ---- strong per-song variation from the seed (so no two songs feel alike) ----
    mood.tempo = Math.round(mood.tempo + (r()*2-1)*26);            // ±26 BPM
    mood.rootKey = Math.floor(r()*12);                             // any of 12 keys
    mood.octave = r()<0.5 ? 0 : (r()<0.6 ? -1 : 1);                // bass register varies
    mood.bright = Math.min(1,Math.max(0.15, mood.bright+(r()*2-1)*0.3));
    mood.drive  = Math.min(1,Math.max(0.1,  mood.drive +(r()*2-1)*0.3));
    mood.airy   = Math.min(1,Math.max(0.1,  mood.airy  +(r()*2-1)*0.3));
    mood.swing  = r()*0.18;                                        // groove feel
    mood.arpStyle = Math.floor(r()*4);                             // 0..3 distinct patterns
    mood.padVoices = r()<0.5?3:(r()<0.7?2:4);
    mood.chordSeq = [0, Math.floor(r()*5), Math.floor(r()*6), Math.floor(r()*4)]; // unique progression
    const altWaves=['sawtooth','square','triangle','sine'];
    if(r()<0.4) mood.wave=altWaves[Math.floor(r()*4)];            // sometimes shift timbre
    mood.seed=seed;
    return mood;
  }

  function setup(s){song=s;seedViz(s);
    const btn=document.getElementById('playBtn');
    if(btn)btn.onclick=toggle;
  }

  function ensureCtx(){
    if(ctx)return;
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    master=ctx.createGain();master.gain.value=0.0;
    const comp=ctx.createDynamicsCompressor();
    analyser=ctx.createAnalyser();analyser.fftSize=512;analyser.smoothingTimeConstant=0.82;
    freqData=new Uint8Array(analyser.frequencyBinCount);
    timeData=new Uint8Array(analyser.frequencyBinCount);
    master.connect(comp);comp.connect(analyser);
    // analyser reads the signal for the bars but doesn't connect to speakers —
    // YouTube provides the real audio; synth runs silently as the frequency source
  }

  function schedule(s){
    const seed=hash(s.title+s.artist);const rand=rng(seed);
    const m=profile(s);
    const root=98*Math.pow(2,(m.rootKey+m.octave*12)/12); // seeded key + register
    const scale=SCALES[m.scale];
    const beat=60/m.tempo;
    const now=ctx.currentTime+0.06;startT=now;stopAt=now+DUR;
    const note=(deg,oct)=>root*Math.pow(2,oct+scale[((deg%scale.length)+scale.length)%scale.length]/12);

    // master fade in/out
    master.gain.setValueAtTime(0,now);
    master.gain.linearRampToValueAtTime(0.9,now+0.5);
    master.gain.setValueAtTime(0.9,stopAt-0.6);
    master.gain.linearRampToValueAtTime(0,stopAt);

    // ---- pad (sustained chord, airy) — voice count varies per song ----
    const padGain=ctx.createGain();padGain.gain.value=0.12+m.airy*0.12;
    const padFilter=ctx.createBiquadFilter();padFilter.type='lowpass';
    padFilter.frequency.value=500+m.bright*2600;
    padGain.connect(padFilter);padFilter.connect(master);nodes.push(padGain,padFilter);
    const padDegs=[0,2,4,6].slice(0,m.padVoices);
    padDegs.forEach((deg,i)=>{
      const o=ctx.createOscillator();o.type=m.wave==='square'?'sawtooth':m.wave;
      o.frequency.value=note(deg,0);o.detune.value=(i-1)*7+ (rand()*10-5);
      const g=ctx.createGain();g.gain.value=0.45;o.connect(g);g.connect(padGain);
      o.start(now);o.stop(stopAt+0.05);nodes.push(o,g);
    });

    // ---- bass pulse — follows this song's unique chord progression + swing ----
    const steps=Math.floor(DUR/beat);
    for(let i=0;i<steps;i++){
      const t=now+i*beat + (i%2?m.swing*beat:0);
      const o=ctx.createOscillator();o.type=m.drive>0.6?'sawtooth':'sine';
      const deg=m.chordSeq[Math.floor(i/2)%m.chordSeq.length];
      o.frequency.setValueAtTime(note(deg,-1),t);
      const g=ctx.createGain();
      const peak=0.5+m.drive*0.45;
      g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(peak,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.001,t+beat*0.9);
      o.connect(g);g.connect(master);o.start(t);o.stop(t+beat);nodes.push(o,g);
    }

    // ---- arp / melody — pattern shape varies per song (arpStyle) ----
    const arpGain=ctx.createGain();arpGain.gain.value=0.16+m.bright*0.12;
    const arpDelay=ctx.createDelay();arpDelay.delayTime.value=beat/2;
    const fb=ctx.createGain();fb.gain.value=0.30+m.airy*0.20;
    arpDelay.connect(fb);fb.connect(arpDelay);
    arpGain.connect(master);arpDelay.connect(master);nodes.push(arpGain,arpDelay,fb);
    const sub=beat/2;const asteps=Math.floor(DUR/sub);
    // four distinct melodic shapes
    const patterns=[
      [0,2,4,2,0,4,2,4],     // rolling
      [0,4,1,5,2,6,3,0],     // climbing
      [4,3,2,1,0,1,2,3],     // descending wave
      [0,0,3,0,5,0,2,4]      // syncopated stabs
    ];
    const pat=patterns[m.arpStyle];
    for(let i=0;i<asteps;i++){
      if(m.arpStyle!==3 && rand()<0.18)continue;
      const t=now+i*sub + (i%2?m.swing*sub:0);
      const deg=pat[i%pat.length] + (rand()<0.25?scale.length:0);
      const oct=rand()<(0.3+m.bright*0.3)?2:1;
      const o=ctx.createOscillator();o.type=m.wave;
      o.frequency.setValueAtTime(note(deg,oct),t);
      const g=ctx.createGain();g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.6,t+0.01);
      g.gain.exponentialRampToValueAtTime(0.001,t+sub*0.95);
      o.connect(g);g.connect(arpGain);g.connect(arpDelay);
      o.start(t);o.stop(t+sub);nodes.push(o,g);
    }

    // ---- hi-hat-ish noise for drive ----
    if(m.drive>0.4){
      const hsteps=Math.floor(DUR/(beat/2));
      for(let i=0;i<hsteps;i++){
        const t=now+i*(beat/2);
        const buf=ctx.createBuffer(1,1024,ctx.sampleRate);const d=buf.getChannelData(0);
        for(let j=0;j<1024;j++)d[j]=(Math.random()*2-1)*Math.pow(1-j/1024,3);
        const src=ctx.createBufferSource();src.buffer=buf;
        const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=6000;
        const g=ctx.createGain();g.gain.value=(i%2?0.05:0.12)*m.drive;
        src.connect(hp);hp.connect(g);g.connect(master);src.start(t);nodes.push(src,g,hp);
      }
    }
  }

  function toggle(){playing?stop():play();}
  function play(){
    if(!song)return;ensureCtx();
    if(ctx.state==='suspended')ctx.resume();
    stop(true); // clear any prior
    schedule(song);
    playing=true;
    const btn=document.getElementById('playBtn');if(btn){btn.classList.add('playing');btn.textContent='❚❚';}
    const hint=document.getElementById('vizHint');if(hint)hint.classList.add('hide');
    loop();
  }
  function stop(silent){
    playing=false;
    if(raf)cancelAnimationFrame(raf),raf=null;
    nodes.forEach(n=>{try{n.disconnect&&n.disconnect();}catch(e){}; try{n.stop&&n.stop();}catch(e){}});
    nodes=[];
    if(master&&ctx){try{master.gain.cancelScheduledValues(ctx.currentTime);master.gain.setValueAtTime(0,ctx.currentTime);}catch(e){}}
    energy.bass=energy.mid=energy.treble=energy.level=0;
    if(!silent){
      const btn=document.getElementById('playBtn');if(btn){btn.classList.remove('playing');btn.textContent='▶';}
      const hint=document.getElementById('vizHint');if(hint)hint.classList.remove('hide');
      const fill=document.getElementById('seekFill');if(fill)fill.style.width='0%';
      const pt=document.getElementById('ptime');if(pt)pt.textContent='a sound made just for this track';
    }
  }

  // ---- the visualizer ----
  let viz=null,vctx=null;
  function loop(){
    raf=requestAnimationFrame(loop);
    if(analyser){
      analyser.getByteFrequencyData(freqData);
      analyser.getByteTimeDomainData(timeData);
      // compute energy bands
      const n=freqData.length;
      let b=0,mm=0,tr=0;
      const bEnd=Math.floor(n*0.12),mEnd=Math.floor(n*0.45);
      for(let i=0;i<bEnd;i++)b+=freqData[i];
      for(let i=bEnd;i<mEnd;i++)mm+=freqData[i];
      for(let i=mEnd;i<n;i++)tr+=freqData[i];
      b/=(bEnd*255);mm/=((mEnd-bEnd)*255);tr/=((n-mEnd)*255);
      energy.bass+=(b-energy.bass)*0.25;
      energy.mid+=(mm-energy.mid)*0.25;
      energy.treble+=(tr-energy.treble)*0.25;
      energy.level+=((b*0.5+mm*0.35+tr*0.15)-energy.level)*0.2;
    }
    // seek bar + auto-stop at end of the synth loop
    if(ctx&&playing){
      const elapsed=Math.min(DUR,Math.max(0,ctx.currentTime-startT));
      const fill=document.getElementById('seekFill');if(fill)fill.style.width=(elapsed/DUR*100)+'%';
      if(ctx.currentTime>=stopAt){stop();return;}
    }
    draw();
  }
  function startViz(){if(!raf)loop();}
  function fmt(s){const m=Math.floor(s/60),x=Math.floor(s%60);return m+':'+String(x).padStart(2,'0');}

  // alien creature state (persists across frames, re-seeded per song)
  let vizSeed=0,vizHue=190,peaks=null;
  function seedViz(s){
    vizSeed=hash(s.title);const r=rng(vizSeed);
    vizHue=Math.floor(r()*360);
    peaks=null; // reset falling peak caps
  }

  function draw(){
    viz=viz||document.getElementById('vizCanvas');
    if(!viz)return;
    if(!vctx)vctx=viz.getContext('2d');
    const dpr=Math.min(devicePixelRatio||1,2);
    const w=viz.clientWidth,h=viz.clientHeight;
    if(viz.width!==w*dpr){viz.width=w*dpr;viz.height=h*dpr;}
    const g=vctx;g.setTransform(dpr,0,0,dpr,0,0);
    // light trailing fade for a touch of glow-smear, but mostly clean
    g.globalCompositeOperation='source-over';
    g.fillStyle='rgba(6,6,14,0.38)';g.fillRect(0,0,w,h);

    const T=performance.now()/1000;
    const BARS=56, bw=w/BARS, mid=h/2;
    if(!peaks||peaks.length!==BARS)peaks=new Array(BARS).fill(0);
    // Bars are driven by the synth's own frequency analyser.
    const srcFreq=freqData||null;
    const srcLen=srcFreq?srcFreq.length:64;
    const lvl=energy?energy.level:0;

    g.globalCompositeOperation='lighter';
    for(let i=0;i<BARS;i++){
      // sample frequency data with a slight log-ish spread, emphasize lows-mids
      const idx=Math.floor(Math.pow(i/BARS,1.35)*srcLen*0.85);
      let v=srcFreq?srcFreq[idx]/255:0;
      // wild factor: exaggerate + a little inter-bar shimmer
      v=Math.pow(v,0.78);
      const jitter=0.92+0.08*Math.sin(T*9+i*0.7);
      const bh=v*mid*1.85*jitter;          // bars reach up & down from center
      const hue=(vizHue + i/BARS*180 + T*30)%360;  // sweeping rainbow neon
      const x=i*bw;

      // mirrored bar (grows from center both ways)
      const grd=g.createLinearGradient(0,mid-bh,0,mid+bh);
      grd.addColorStop(0,`hsla(${hue},100%,68%,.95)`);
      grd.addColorStop(.5,`hsla(${(hue+40)%360},100%,60%,.65)`);
      grd.addColorStop(1,`hsla(${(hue+80)%360},100%,68%,.95)`);
      g.fillStyle=grd;
      g.shadowColor=`hsla(${hue},100%,60%,.9)`;g.shadowBlur=10+v*22;
      g.fillRect(x+1,mid-bh,bw-2,bh*2);

      // falling peak caps
      if(bh>peaks[i])peaks[i]=bh; else peaks[i]=Math.max(0,peaks[i]-mid*0.012);
      g.shadowBlur=14;
      g.fillStyle=`hsla(${(hue+120)%360},100%,80%,.95)`;
      g.fillRect(x+1,mid-peaks[i]-2,bw-2,2);
      g.fillRect(x+1,mid+peaks[i],bw-2,2);
    }
    g.shadowBlur=0;

    // thin center spine that flares with overall level
    g.fillStyle=`hsla(${vizHue},100%,75%,${0.3+lvl*0.6})`;
    g.fillRect(0,mid-1,w,2);
    g.globalCompositeOperation='source-over';
  }

  return {setup,play,stop,toggle,energy,isPlaying:()=>playing,seedViz,startViz};
})();

/* ===== YouTube Real Audio Engine =====
   Uses YouTube Data API v3 to find the exact official video,
   then plays it via the IFrame player hidden behind the viz.
   The NEON synth continues to drive the bars via its own analyser.
   Replace YT_API_KEY with your key. ===== */
const YT_API_KEY = 'YOUR_API_KEY_HERE';

const YT_ENGINE=(function(){
  let player=null, ready=false, pending=null, playing=false;

  // Add hidden player host
  const host=document.createElement('div');
  host.id='ytHost';
  host.style.cssText='position:fixed;width:320px;height:180px;bottom:0;left:0;opacity:0.001;pointer-events:none;z-index:-1';
  document.body.appendChild(host);

  // Load IFrame API
  const tag=document.createElement('script');
  tag.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady=function(){
    player=new YT.Player('ytHost',{
      width:'320',height:'180',
      playerVars:{autoplay:1,controls:0,playsinline:1,rel:0,fs:0,disablekb:1},
      events:{
        onReady:()=>{
          ready=true;
          if(pending){const s=pending;pending=null;cue(s);}
        },
        onError:e=>{
          // embedding disabled or removed — try next result
          try{player.nextVideo();}catch(_){}
        },
        onStateChange:e=>{
          if(e.data===YT.PlayerState.PLAYING){
            playing=true;
            try{player.unMute();player.setVolume(100);}catch(_){}
          } else if(e.data===YT.PlayerState.PAUSED||e.data===YT.PlayerState.ENDED){
            playing=false;
          } else if(e.data===YT.PlayerState.CUED){
            seekMid();
            try{player.playVideo();}catch(_){}
          }
        }
      }
    });
  };

  // Use Data API to find the best official video ID
  async function findVideoId(s){
    const q=encodeURIComponent(s.artist+' '+s.title+' official audio');
    const url=`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=5&q=${q}&key=${YT_API_KEY}`;
    try{
      const res=await fetch(url);
      if(!res.ok)throw new Error('api '+res.status);
      const data=await res.json();
      if(!data.items||!data.items.length)throw new Error('no results');
      // prefer topic/official channels, fall back to first result
      const official=data.items.find(i=>{
        const ch=(i.snippet.channelTitle||'').toLowerCase();
        return ch.includes('- topic')||ch.includes('vevo')||ch.includes('official');
      });
      return (official||data.items[0]).id.videoId;
    }catch(e){
      console.warn('YT search failed:',e.message);
      return null;
    }
  }

  function seekMid(){
    let tries=0;
    const t=setInterval(()=>{
      tries++;
      let d=0;try{d=player.getDuration();}catch(_){}
      if(d>30){
        const mid=d*0.33+Math.random()*d*0.18;
        try{player.seekTo(mid,true);player.playVideo();}catch(_){}
        clearInterval(t);
      } else if(tries>40) clearInterval(t);
    },200);
  }

  async function cue(s){
    if(!ready){pending=s;return;}
    const id=await findVideoId(s);
    if(!id){console.warn('no video found for',s.title);return;}
    try{
      player.mute();
      player.loadVideoById({videoId:id,suggestedQuality:'small'});
      seekMid();
    }catch(e){console.warn('cue error',e);}
  }

  function stop(){
    playing=false;
    if(player&&ready)try{player.stopVideo();}catch(_){}
  }
  function toggle(){
    if(playing){try{player.pauseVideo();}catch(_){}playing=false;}
    else{try{player.playVideo();}catch(_){}playing=true;}
  }
  function isPlaying(){return playing;}

  return {cue,stop,toggle,isPlaying};
})();




/* ===== Data loader: reads playlist.csv from the repo + merges local lore =====
   Update your site by re-exporting your playlist (e.g. exportify.app) and
   replacing playlist.csv in your GitHub repo. No login, nothing to break. */
function normalizeKey(title, artist){
  return (title+'|'+artist).toLowerCase().replace(/[^a-z0-9|]/g,'').trim();
}

// minimal, robust CSV parser (handles quoted fields, commas, escaped quotes, CRLF)
function parseCSV(text){
  const rows=[];let row=[],field='',inQ=false;
  text=text.replace(/^\uFEFF/,''); // strip BOM
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; }
      else field+=c;
    } else {
      if(c==='"')inQ=true;
      else if(c===','){row.push(field);field='';}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}
      else if(c==='\r'){/* ignore */}
      else field+=c;
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}

function msToDur(ms){const s=Math.round((+ms||0)/1000);return s?Math.floor(s/60)+':'+String(s%60).padStart(2,'0'):'';}

// map flexible header names -> our fields (works with Exportify, Spotlistr, Chosic, etc.)
function csvToTracks(text){
  const rows=parseCSV(text).filter(r=>r.length>1);
  if(!rows.length)return [];
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const find=(...names)=>{for(const n of names){const i=head.indexOf(n);if(i>=0)return i;}return -1;};
  const iTitle=find('track name','title','name','song');
  const iArtist=find('artist name(s)','artist name','artist','artists','artist(s)');
  const iAlbum=find('album name','album');
  const iDate=find('release date','released','year','date');
  const iDurMs=find('duration (ms)','duration_ms','duration ms');
  const iDur=find('duration','length','time');
  const iUri=find('track uri','spotify id','uri','id','track id');
  const out=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r];if(!row||!row.length)continue;
    const title=(iTitle>=0?row[iTitle]:'').trim();
    if(!title)continue;
    const artist=(iArtist>=0?row[iArtist]:'').trim();
    const date=(iDate>=0?row[iDate]:'').trim();
    out.push({
      id:(iUri>=0?row[iUri]:'')||('csv'+r),
      title, artist,
      album:(iAlbum>=0?row[iAlbum]:'').trim(),
      year:(date.match(/\d{4}/)||[''])[0],
      duration:iDurMs>=0?msToDur(row[iDurMs]):(iDur>=0?row[iDur].trim():'')
    });
  }
  return out;
}

function mergeLore(tracks){
  const loreMap={};
  for(const l of LORE) loreMap[normalizeKey(l.title,l.artist)]=l;
  return tracks.map((t,i)=>{
    const firstArtist=(t.artist||'').split(/[,;]/)[0].trim();
    const lore=loreMap[normalizeKey(t.title,firstArtist)] || loreMap[normalizeKey(t.title,t.artist)] || {};
    return {
      id:t.id||('t'+i),
      title:t.title, artist:t.artist||lore.artist||'',
      album:t.album||lore.album||'', year:t.year||lore.year||'',
      duration:t.duration||lore.duration||'', artwork_url:lore.artwork_url||'',
      listens:lore.listens||0,
      song_history:lore.song_history||'', artist_info:lore.artist_info||'',
      artist_history:lore.artist_history||'', cool_facts:lore.cool_facts||[],
      tragedy_or_meaning:lore.tragedy_or_meaning||'',
      artist_origin:lore.artist_origin||'', track_made_in:lore.track_made_in||''
    };
  });
}

/* ===== Oracle logic ===== */
function initOracle(SONGS){
  const maxListens=Math.max(1,...SONGS.map(s=>s.listens||0));
  const orb=document.getElementById('orb'),orbWrap=document.getElementById('orbWrap');
  const reveal=document.getElementById('reveal'),card=document.getElementById('card');
  const shock=document.getElementById('shock'),orbHint=document.getElementById('orbHint');
  const poolEl=document.getElementById('poolCount');
  if(poolEl)poolEl.textContent=SONGS.length+' tracks in the well';
  let lastId=null, busy=false, currentSong=null;

  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function pickSong(){
    let s;do{s=SONGS[Math.floor(Math.random()*SONGS.length)];}while(SONGS.length>1&&s.id===lastId);
    lastId=s.id;return s;
  }

  // deterministic neon sleeve (matches engine art style)
  const artCache={};
  function genArt(artist,title){
    const cv=document.createElement('canvas');cv.width=cv.height=400;const g=cv.getContext('2d');
    let h=0;const str=artist+title;for(let i=0;i<str.length;i++)h=str.charCodeAt(i)+((h<<5)-h);
    const h1=Math.abs(h%360);const grd=g.createLinearGradient(0,0,400,400);
    grd.addColorStop(0,`hsl(${h1},85%,12%)`);grd.addColorStop(.5,`hsl(${(h1+260)%360},70%,8%)`);
    grd.addColorStop(1,`hsl(${(h1+180)%360},80%,10%)`);g.fillStyle=grd;g.fillRect(0,0,400,400);
    g.strokeStyle=`hsla(${h1},100%,60%,.18)`;g.lineWidth=1;
    for(let i=0;i<=400;i+=40){g.beginPath();g.moveTo(i,0);g.lineTo(i,400);g.stroke();g.beginPath();g.moveTo(0,i);g.lineTo(400,i);g.stroke();}
    g.shadowColor=`hsl(${h1},100%,60%)`;g.shadowBlur=24;g.strokeStyle=`hsla(${h1},100%,65%,.6)`;g.lineWidth=2;
    for(let r=50;r<200;r+=40){g.beginPath();g.arc(200,200,r+(h%14),0,6.2832);g.stroke();}
    g.shadowBlur=30;g.fillStyle=`hsla(${h1},100%,75%,.85)`;g.font='900 200px Orbitron, sans-serif';
    g.textAlign='center';g.textBaseline='middle';g.fillText(artist.charAt(0).toUpperCase(),200,210);
    return cv.toDataURL();
  }
  function artFor(s){if(s.artwork_url)return s.artwork_url;const k=s.artist+s.title;
    if(!artCache[k])artCache[k]=genArt(s.artist,s.title);return artCache[k];}

  function buildCard(s){
    const facts=(s.cool_facts||[]).map(f=>`<li>${esc(f)}</li>`).join('');
    card.innerHTML=`
      <div class="layer l1 r-eyebrow">it chose this one for you</div>
      <img class="layer l1 r-sleeve" src="${artFor(s)}" alt="">
      <h1 class="layer l2 r-title">${esc(s.title)}</h1>
      <div class="layer l2 r-artist">${esc(s.artist)}</div>
      <div class="layer l2 r-sub">${esc(s.album)} · ${s.year} · ${esc(s.duration||'')}</div>

      <div class="layer l3 r-player">
        <div class="viz-wrap"><canvas id="vizCanvas"></canvas></div>
        <div class="r-controls">
          <button class="play-btn playing" id="playBtn" aria-label="Play / pause">❚❚</button>
          <div class="seek"><i id="seekFill"></i></div>
          <button class="takeoff" id="takeoffBtn" aria-label="Take off">take off</button>
        </div>
        <div class="ptime" id="ptime">a sound made just for this track</div>
      </div>

      <div class="layer l4 r-notes">
        <div class="note"><h3>Where it comes from</h3><div class="r-origin">
          <div><div class="k">Artist from</div><div class="v">${esc(s.artist_origin||'Unknown')}</div></div>
          <div><div class="k">Recorded in</div><div class="v">${esc(s.track_made_in||'Unknown')}</div></div></div></div>
        <div class="note"><h3>The story of the song</h3><p>${esc(s.song_history)}</p></div>
      </div>
      <div class="layer l5 r-notes" style="margin-top:24px">
        <div class="note"><h3>About the artist</h3><p>${esc(s.artist_info)}</p></div>
        <div class="note"><h3>How they got here</h3><p>${esc(s.artist_history)}</p></div>
      </div>
      <div class="layer l6 r-notes" style="margin-top:24px">
        <div class="note"><h3>Things worth knowing</h3><ul class="r-facts">${facts}</ul></div>
        <div class="note"><h3>What it really means</h3><p>${esc(s.tragedy_or_meaning)}</p></div>
      </div>

      <button class="again layer l6" id="againBtn"><span class="o">◈</span> let it choose again</button>
    `;
  }

  function doRoll(){
    if(busy)return;busy=true;
    const s=pickSong();
    currentSong=s;
    // Setup synth for bar-driving ONLY — do NOT play it (YouTube is the audio)
    NEON.setup(s);
    NEON.startViz();
    // YouTube finds and plays the real recording
    YT_ENGINE.cue(s);
    // shockwave from center
    shock.classList.remove('go');void shock.offsetWidth;shock.classList.add('go');
    orbWrap.classList.add('charging');
    setTimeout(()=>orbWrap.classList.add('revealed'),120);
    setTimeout(()=>{
      buildCard(s);
      reveal.classList.add('show');
      const pb=document.getElementById('playBtn');
      if(pb)pb.onclick=()=>{
        YT_ENGINE.toggle();
        if(YT_ENGINE.isPlaying()){pb.classList.add('playing');pb.textContent='❚❚';}
        else{pb.classList.remove('playing');pb.textContent='▶';}
      };
      const again=document.getElementById('againBtn');
      if(again)again.onclick=rollAgain;
      const takeoff=document.getElementById('takeoffBtn');
      if(takeoff)takeoff.onclick=()=>{
        takeoff.classList.remove('launching');void takeoff.offsetWidth;takeoff.classList.add('launching');
        window.open('https://open.spotify.com/search/'+encodeURIComponent(s.artist+' '+s.title),'_blank','noopener');
      };
      busy=false;
    },650);
  }

  function rollAgain(){
    if(busy)return;busy=true;
    NEON.stop();
    YT_ENGINE.stop();
    reveal.classList.remove('show');
    setTimeout(()=>{
      card.innerHTML='';
      orbWrap.classList.remove('revealed','charging');
      busy=false;
    },600);
  }

  orb.onclick=doRoll;
  // keyboard: space/enter when orb focused handled natively; allow "R" to reroll
  document.addEventListener('keydown',e=>{
    if((e.key==='r'||e.key==='R')&&reveal.classList.contains('show'))rollAgain();
    if(e.key===' '&&!reveal.classList.contains('show')&&document.activeElement!==orb){e.preventDefault();doRoll();}
  });
}

/* boot: load songs (live Spotify list, else local), then start */
initOracle(LORE);
</script>
</body>
</html>
