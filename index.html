rd, England, UK","track_made_in":"London, England, UK"},{"id":35,"title":"I Mean It (feat. Remo)","artist":"G-Eazy","album":"These Things Happen","year":2014,"listens":121,"duration":"3:56","song_history":"\"I Mean It\" was released on May 13, 2014 as the fifth single from G-Eazy's debut major-label album 'These Things Happen.' The song was produced by Remo the Hitmaker and Christoph Andersson, with Remo also providing the memorable hook. It became G-Eazy's first entry on the Billboard Hot 100 and received triple-platinum certification.","artist_info":"G-Eazy (born Gerald Earl Gillum, May 24, 1989) is an American rapper from Oakland, California. Known for his smooth blend of rap with pop elements and a retro-cool aesthetic, he built his career from the ground up through independent releases and relentless touring before achieving mainstream success.","artist_history":"G-Eazy began his career in 2006 while at Loyola University in New Orleans, releasing independent music and opening for Lil Wayne and Snoop Dogg. His 2014 major-label debut 'These Things Happen' peaked at #3 on the Billboard 200, and his follow-up 'When It's Dark Out' (2015) featured 'Me, Myself & I' with Bebe Rexha, reaching #7 on the Hot 100.","cool_facts":["'I Mean It' achieved triple-platinum certification from the RIAA","G-Eazy spent nearly a decade polishing his craft before his breakthrough — he doesn't consider himself a 'natural' rapper","The song has over 397 million streams on Spotify alone"],"tragedy_or_meaning":"\"I Mean It\" is a statement of authenticity and determination — G-Eazy declaring that his ambitions and promises aren't empty words. For listeners, it's become an anthem of self-belief and perseverance, resonating with anyone who has had to prove that their dreams aren't just talk but a genuine commitment to their path.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music123/v4/eb/e0/d6/ebe0d6b2-e19c-5b1c-3c92-8b3e1a97dbc0/20UMGIM21065.rgb.jpg/600x600bb.jpg","artist_origin":"Oakland, California, USA","track_made_in":"Oakland, California, USA"},{"id":36,"title":"Otherside","artist":"Red Hot Chili Peppers","album":"Californication","year":1999,"listens":120,"duration":"4:15","song_history":"\"Otherside\" was released as the third single from Red Hot Chili Peppers' seventh studio album 'Californication' (1999). Lead vocalist Anthony Kiedis wrote the song about former band member Hillel Slovak, who died of a heroin overdose in 1988. The song confronts the battles addicts face with their prior addictions and the pull of self-destruction.","artist_info":"Red Hot Chili Peppers are an American rock band formed in Los Angeles in 1983, known for their fusion of funk, punk rock, and psychedelic rock. With members Anthony Kiedis, Flea, Chad Smith, and John Frusciante, they've become one of the best-selling bands in history with a sound that's unmistakably California.","artist_history":"The Red Hot Chili Peppers overcame the tragic loss of original guitarist Hillel Slovak in 1988 and multiple lineup changes to become one of rock's greatest acts. 'Californication' marked the return of guitarist John Frusciante and became a massive commercial and critical success, selling over 16 million copies worldwide.","cool_facts":["The song was written about founding guitarist Hillel Slovak, who died of a heroin overdose at age 26 in 1988","'Californication' sold over 16 million copies worldwide and is considered one of the greatest rock albums of its era","Anthony Kiedis has spoken openly about his own struggles with addiction, giving the song deeply personal weight"],"tragedy_or_meaning":"\"Otherside\" is about the relentless pull of addiction — the 'other side' representing both death and the dark place addiction takes you. Written as a tribute to Hillel Slovak, the song carries the weight of real loss and the ongoing battle of those left behind. Its haunting melody and honest lyrics have made it a touchstone for anyone fighting their own demons.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music124/v4/c7/3c/39/c73c399c-f23c-2ad3-4985-35ee9c441fe4/075679847713.jpg/600x600bb.jpg","artist_origin":"Los Angeles, California, USA","track_made_in":"Los Angeles, California, USA"},{"id":37,"title":"The Ringer","artist":"Eminem","album":"Kamikaze","year":2018,"listens":115,"duration":"5:38","song_history":"\"The Ringer\" opens Eminem's surprise album 'Kamikaze' (2018) with a brutal five-and-a-half-minute statement of intent. Though never released as a single, it debuted in the top 10 in over a dozen countries. Apple Music noted it as 'Em going through receipts over an ominous beat,' with Vox calling it Eminem 'at his self-aggrandizing, self-deprecating, dizzyingly self-assured best.'","artist_info":"Eminem (born Marshall Bruce Mathers III) is an American rapper from Detroit, Michigan. He is one of the best-selling music artists of all time, known for his technical virtuosity, controversial lyrics, and ability to reinvent himself across multiple decades while maintaining his core identity as a battle rapper.","artist_history":"Eminem broke through in 1999, became the best-selling artist of the 2000s, and has maintained relevance across three decades. After the critically panned 'Revival' (2017), he responded with the surprise 'Kamikaze,' which debuted at #1 on the Billboard 200 and broke the UK record for most consecutive #1 albums at nine.","cool_facts":["The track samples Young M.A's 'OOOUUU' and debuted at #8 on the Billboard Hot 100 despite not being an official single","Eminem addresses the fallout from his anti-Trump freestyle at the 2017 BET Awards on this track","The album was executive produced by both Eminem and Dr. Dre"],"tragedy_or_meaning":"\"The Ringer\" is the sound of a legend refusing to go quietly — channeling years of frustration at critics into one concentrated burst of lyrical fury. It represents the fire that burns in every artist who's been written off, a reminder that greatness doesn't expire and that the hunger to prove yourself can intensify rather than diminish with age.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/8/80/Eminem_-_Kamikaze.jpg","artist_origin":"Detroit, Michigan, USA","track_made_in":"Detroit, Michigan, USA"},{"id":38,"title":"California Girls","artist":"NoMBe","album":"Single","year":2015,"listens":114,"duration":"3:07","song_history":"\"California Girls\" was released in 2015 as NoMBe's breakout single, combining electronic beats with guitar progressions in a multi-layered production. Complex Magazine noted it 'initially sounds like a silky, summer anthem' but reveals deeper dimensions on repeated listens. The song paved the way for his 2018 debut album 'They Might've Even Loved Me.'","artist_info":"NoMBe (born Noah McBeth, April 27, 1991) is a German-American recording artist, multi-instrumentalist, and producer based in Los Angeles. He refers to his music as 'Electric Soul,' combining elements of indie, chillwave, and modern-day soul music into atmospheric, genre-bending compositions.","artist_history":"Born in Heidelberg, Germany, NoMBe moved to Los Angeles where he built his career blending hip-hop, R&B, and classic rock influences. His 2015 single 'California Girls' garnered attention from tastemakers and launched a journey to his 2018 debut album. He is notably the godson of legendary musician Chaka Khan.","cool_facts":["NoMBe is the godson of legendary funk/soul artist Chaka Khan","He was born in Heidelberg, Germany before relocating to Los Angeles","His music has been described as 'Electric Soul' — seamlessly transitioning from hip-hop to R&B to classic rock within a single song"],"tragedy_or_meaning":"\"California Girls\" isn't the beach-party anthem its title might suggest — it's a more nuanced, melancholic reflection on the dreamlike quality of California living and the people who drift through it. It captures the bittersweet reality of chasing beauty and connection in a city built on illusions.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/59/Metro_Boomin_-_Heroes_%26_Villains.png","artist_origin":"Heidelberg, Germany","track_made_in":"Los Angeles, California, USA"},{"id":39,"title":"Loss of A Brother","artist":"Anton F","album":"Single","year":2020,"listens":112,"duration":"2:28","song_history":"\"Loss of A Brother\" is an emotionally raw track by independent artist Anton F that channels the profound grief of losing a sibling into music. The song's intimate production and deeply personal lyrics create a cathartic listening experience, representing the kind of honest, unfiltered emotion that independent artists can express without commercial constraints.","artist_info":"Anton F is an independent artist who creates emotionally driven music that explores themes of loss, grief, and healing. As an underground artist, he represents the growing community of musicians who use digital platforms to share deeply personal stories with listeners seeking authentic emotional connection.","artist_history":"Anton F has built a following through streaming platforms, connecting with listeners through raw, emotionally honest songwriting. His work represents the independent music movement where artists create without major label backing, allowing for more personal and uncompromising artistic expression.","cool_facts":["The track's short 2:28 runtime gives it an intimate, diary-entry quality — saying what needs to be said without excess","Anton F represents the wave of independent artists finding audiences through streaming platforms","The song connects with a universal human experience — grief for a lost loved one — making it deeply relatable"],"tragedy_or_meaning":"\"Loss of A Brother\" is exactly what its title suggests — a raw, unfiltered expression of grief following the loss of a sibling. The song provides solace to listeners who have experienced similar loss, creating a shared space for mourning. Its presence on this playlist suggests it holds deeply personal significance for the listener.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/58/Post_Malone_-_Hollywood%27s_Bleeding.png","artist_origin":"USA","track_made_in":"USA"},{"id":40,"title":"Don Corleone (feat. Vincent Pastore)","artist":"Chris Webby","album":"Single","year":2019,"listens":112,"duration":"3:19","song_history":"\"Don Corleone\" was released on May 28, 2019 and features actor Vincent Pastore — famous for playing 'Big Pussy' Salvatore Bonpensiero on The Sopranos. Produced by JP On Da Track and Nox Beatz, the track pays homage to The Godfather's iconic Don Vito Corleone, with Webby delivering sharp wordplay over a menacing, cinematic beat.","artist_info":"Chris Webby (born Christian Talcott Webster, October 13, 1988) is an American rapper from Norwalk, Connecticut. Known for his sharp wordplay, pop culture references, and high-energy flows, he blends underground grit with mainstream appeal and has maintained a fiercely independent career.","artist_history":"Chris Webby started rapping in sixth grade and built his early fanbase through college party performances. His DJ Drama-hosted mixtape 'Bars On Me' (2012) and EP 'There Goes the Neighborhood' (2011) peaked at #101 on the Billboard 200. He's maintained a prolific independent career, releasing music consistently without major label support.","cool_facts":["The track features Vincent Pastore, who played 'Big Pussy' on HBO's The Sopranos","Chris Webby has maintained one of hip-hop's most prolific independent careers, releasing new music constantly","He started rapping in sixth grade and first gained fans performing at college keg parties in Connecticut"],"tragedy_or_meaning":"\"Don Corleone\" channels the mythology of power, loyalty, and family from The Godfather into a hip-hop context — the idea that respect is earned through actions and that loyalty is the highest currency. For listeners, it's an adrenaline-fueled anthem about commanding respect and moving through the world with purpose and authority.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/0/09/Chris_Webby_Chemically_Imbalanced.jpg","artist_origin":"Norwalk, Connecticut, USA","track_made_in":"Norwalk, Connecticut, USA"},{"id":41,"title":"You're Somebody Else","artist":"flora cash","album":"Nothing Lasts Forever (And It's Fine)","year":2017,"listens":111,"duration":"3:39","song_history":"\"You're Somebody Else\" was originally included on flora cash's debut album 'Nothing Lasts Forever (And It's Fine),' released in April 2017 through Stockholm-based indie label Icons Creating Evil Art. After achieving viral success, it was licensed to Sony Music's RCA Records. Forbes called it 'arguably the most intriguing song on radio.'","artist_info":"flora cash is a Swedish-American indie duo formed by Kosovo-born Shpresa Lleshaj and American musician Cole Randall. They blend melancholic melodies with folk and pop influences, pairing electronic beats with soaring vocals to create atmospheric songs with a deeply emotional core.","artist_history":"The duo met on SoundCloud in 2012 when Lleshaj began commenting on tracks Randall posted from Minneapolis. Despite being separated by thousands of miles (she in Sweden, he in Minneapolis), they formed a fast online friendship that escalated quickly — within a year they were married. They began making music together and eventually achieved mainstream recognition.","cool_facts":["Shpresa and Cole met on SoundCloud in 2012, fell in love through music, and were married within a year","The song went viral and was picked up by RCA Records after initially being released on a small Swedish indie label","Their love story — from online pen pals to married hit-making partners — is as compelling as their music"],"tragedy_or_meaning":"\"You're Somebody Else\" captures the devastating moment of watching someone you love become unrecognizable — whether through personal change, mental health struggles, or growing apart. The song's quiet devastation resonates with anyone who has looked at a loved one and felt like they were seeing a stranger.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music113/v4/5c/82/7e/5c827e64-e0e0-aa85-ab16-81a07c7bcf23/cover_APASHE_Renaissance.jpg/600x600bb.jpg","artist_origin":"Stockholm, Sweden","track_made_in":"Stockholm, Sweden"},{"id":42,"title":"Whoopty","artist":"CJ","album":"Single","year":2020,"listens":111,"duration":"2:03","song_history":"\"Whoopty\" was self-released in July 2020 by Staten Island rapper CJ, who recorded it on a Wednesday, shot the video on Friday, and dropped it a week later. The beat samples 'Sanam Re,' a Bollywood song by Arijit Singh, which CJ found on YouTube. It blew up on TikTok almost immediately and earned him a deal with Warner Records.","artist_info":"CJ (born Christopher Daniel Soriano) is an American rapper from Staten Island, New York. His music represents the New York drill movement, incorporating the city's aggressive energy with melodic elements. He cites the late Pop Smoke as an inspiration for popularizing the drill style that influenced him.","artist_history":"Before 'Whoopty,' CJ was making music casually — releasing a song every few months to see what would happen on YouTube and SoundCloud. The viral success of 'Whoopty' transformed his career virtually overnight, earning co-signs from Cardi B and 50 Cent, and securing a major record deal with Warner Records.","cool_facts":["The song samples 'Sanam Re,' a Bollywood love song — the same sample was used by Pop Smoke and King Von in drill tracks","CJ recorded and filmed the entire song within the span of one week","It was CJ's first-ever drill beat — his previous material was more melodic rap"],"tragedy_or_meaning":"\"Whoopty\" represents the raw energy and ambition of New York drill music — it's the sound of a young artist discovering his voice and having it validated by millions overnight. The song's infectious energy and CJ's confident delivery embody the dream of breaking through, and its viral success proved that one perfect moment can change everything.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/2/23/Drew_Barrymore_-_Bryce_Vine.png","artist_origin":"Staten Island, New York, USA","track_made_in":"New York, USA"},{"id":43,"title":"22s","artist":"KOKO","album":"Single","year":2021,"listens":111,"duration":"3:06","song_history":"\"22s\" was released on March 19, 2021 as a collaboration between KOKO (featuring Oliver Garland), German pop artist Nina Chuba, and producer Dillistone. The track kicks off with Oliver Garland's smooth vocals blending with soft synth stabs and a powerful bassline, building to a chorus where both singers fuse their voices together brilliantly.","artist_info":"KOKO features British pop singer Oliver Garland, known for solo releases like 'Deep Down' and 'Dry Your Eyes.' The collaboration with Nina Chuba (a German pop artist who first gained notice as a child actor) and producer Dillistone brings together three distinct creative voices in a genre-blending electronic pop track.","artist_history":"Oliver Garland made a name for himself as a solo artist before collaborating on '22s.' Nina Chuba pivoted from acting to music, initially resisting singing in any language other than English before eventually becoming a German pop star. Their collaboration represents the international, internet-connected nature of modern music creation.","cool_facts":["Nina Chuba first gained notice in Germany as a child actor before transitioning to music","The track brings together British, German, and electronic production talents in one seamless collaboration","The song features both Oliver Garland and Nina Chuba's voices fusing together during the chorus for a goosebump-inducing moment"],"tragedy_or_meaning":"\"22s\" captures the restless energy and yearning of your early twenties — the feeling of being young, ambitious, and hungry for life. The song's pulsing production and dual vocals create a sense of urgency and possibility, resonating with anyone navigating the beautiful chaos of figuring out who they are.","artwork_url":"","artist_origin":"Bristol, England, UK","track_made_in":"Bristol, England, UK"},{"id":44,"title":"Drew Barrymore","artist":"Bryce Vine","album":"Carnival","year":2018,"listens":110,"duration":"3:11","song_history":"\"Drew Barrymore\" started as a discarded voice memo that Bryce Vine almost deleted. Inspired by watching Drew Barrymore in The Wedding Singer, he chose her as the perfect metaphor because she's 'kind of Hollywood royalty, but she's kind of a badass, but she's kind of sweet.' The song became his breakthrough hit, landing him his first Billboard chart placement.","artist_info":"Bryce Vine (born Bryce Ross-Johnson) is an American rapper and singer whose debut album 'Carnival' (2019) blends hip-hop, pop, and R&B influences. Inspired by Blink-182, Third Eye Blind, and Everclear in his teens, he originally envisioned himself in a band before finding success as a solo artist.","artist_history":"Before his music breakthrough, Bryce Vine auditioned for The Glee Project on TV. He built his career through the sultry, R&B-colored sound of 'Drew Barrymore,' which hit the Billboard Hot 100 and accumulated over 21 million streams. His debut album 'Carnival' featured both 'Drew Barrymore' and 'La La Land' as his first charting songs.","cool_facts":["The song almost never existed — it started as a voice memo Bryce nearly deleted","He chose Drew Barrymore specifically after watching The Wedding Singer, seeing her as the ideal combination of Hollywood, badass, and sweet","Bryce Vine originally auditioned for The Glee Project before pursuing his solo music career"],"tragedy_or_meaning":"\"Drew Barrymore\" is a love letter to the kind of woman who doesn't fit a single box — someone who's simultaneously glamorous and down-to-earth, confident and vulnerable. It resonates because it celebrates women for their complexity rather than reducing them to one quality, and its sun-soaked vibe makes admiration feel effortless and genuine.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/3/3b/Flora_Cash_-_You%27re_Somebody_Else.png","artist_origin":"New York, USA","track_made_in":"Los Angeles, California, USA"},{"id":45,"title":"Down on Your Knees","artist":"flora cash","album":"Can Summer Love Last Forever?","year":2016,"listens":108,"duration":"4:08","song_history":"\"Down on Your Knees\" was released on March 18, 2016 as part of flora cash's EP 'Can Summer Love Last Forever?' The track was written and produced entirely by Cole Randall and Shpresa Lleshaj during their early period of collaboration, featuring their signature blend of atmospheric indie folk with electronic elements and deeply emotional vocal delivery.","artist_info":"flora cash is a Swedish-American indie duo formed by Kosovo-born Shpresa Lleshaj and American musician Cole Randall from Minneapolis. Their music pairs electronic beats with soaring vocals and melancholic melodies, creating atmospheric songs that explore love, loss, and vulnerability.","artist_history":"After meeting on SoundCloud in 2012 and quickly falling in love, Shpresa and Cole released a string of EPs before their breakthrough with 'Nothing Lasts Forever (And It's Fine)' in 2017. 'Down on Your Knees' comes from their earlier, more intimate catalog, representing the raw creative energy of two people discovering their sound together.","cool_facts":["The song was written entirely by Shpresa Lleshaj and Cole Randall — the married duo produces everything themselves","It was released before their mainstream breakthrough, representing their pure, uncompromised indie era","Flora cash's early work was released through a Stockholm-based indie label called Icons Creating Evil Art"],"tragedy_or_meaning":"\"Down on Your Knees\" explores the vulnerability of watching someone you love struggle — seeing them brought low and feeling powerless to help. The lyrics 'almost winning and now I don't know, but it seems like it's almost away from me' capture the frustrating nearness of resolution that never quite arrives, speaking to anyone navigating uncertainty in love.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music125/v4/e3/3b/c9/e33bc975-d92d-42fa-d351-017f99abd2be/886447413456.jpg/600x600bb.jpg","artist_origin":"Stockholm, Sweden","track_made_in":"Stockholm, Sweden"},{"id":46,"title":"Summer Is a Curse","artist":"The Faim","album":"Summer Is a Curse EP","year":2018,"listens":107,"duration":"3:02","song_history":"\"Summer Is a Curse\" was the title track of The Faim's debut EP, released in September 2018 through BMG Rights Management. The song was co-written with Ashton Irwin of 5 Seconds of Summer and is about realizing you have to follow your dreams even if it requires sacrifice — inspired by the band leaving Australia and being placed in LA for the first time.","artist_info":"The Faim are a four-piece band from Perth, Australia consisting of vocalist Josh Raven, bassist Stephen Beerkens, guitarist Samuel Tye, and drummer Linden Marissen. They make anthemic, guitar-driven pop/rock influenced by Fall Out Boy and Panic! At the Disco.","artist_history":"The Faim gained widespread attention with their 2018 EP featuring 'Saints and Sinners,' co-written by Fall Out Boy's Pete Wentz. Their debut EP accumulated over 15 million streams worldwide, and they performed at major UK festivals including Download, Slam Dunk, and Reading & Leeds before releasing their full-length 'State of Mind' in 2019.","cool_facts":["The title track was co-written with Ashton Irwin of 5 Seconds of Summer","'Saints and Sinners' from the same EP was co-written by Fall Out Boy's Pete Wentz","The band performed at Reading & Leeds, Download, and Slam Dunk festivals in their debut year"],"tragedy_or_meaning":"\"Summer Is a Curse\" is about the sacrifice required to chase your dreams — leaving home, comfort, and certainty behind for the terrifying possibility of success. For the band, it was literal: leaving Perth for LA with nothing guaranteed. The song resonates with anyone who has chosen the uncertain path of passion over the safe road of comfort.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music113/v4/c4/4d/55/c44d5549-0bb8-b1c3-72e5-91e41dc260d1/886448296157.jpg/600x600bb.jpg","artist_origin":"Perth, Australia","track_made_in":"Los Angeles, California, USA"},{"id":47,"title":"Addicted","artist":"Zerb","album":"Single","year":2024,"listens":107,"duration":"2:32","song_history":"\"Addicted\" was released on March 29, 2024 as a collaboration between Brazilian DJ Zerb, The Chainsmokers, and vocalist Ink. The track fuses Zerb's signature Brazilian house style with The Chainsmokers' pop sensibilities, creating an infectious floor-filling dance track. Songfacts described it as a perfect marriage of tropical energy and mainstream appeal.","artist_info":"Zerb (born Matheus Zerbini Massa) is a house DJ and producer from São Paulo, Brazil who rose to prominence with high-energy DJ sets and addictive tropical house originals. He became interested in electronic music at age 14 in 2012, inspired by Skrillex and Deadmau5, and earned a marketing degree from the University of São Paulo in 2019.","artist_history":"Zerb achieved a major international breakthrough in 2023 with 'Mwaki' featuring Kenyan singer Sofiya Nzau, which hit #1 on Spotify's Global Viral Chart and achieved platinum status in Italy. The track was remixed by Tiësto, Major Lazer, and Duke Dumont. He has since performed at Tomorrowland, Parookaville, and Ushuaïa Ibiza.","cool_facts":["'Mwaki' was the #2 most Shazamed record in the world for weeks, with over 100,000 fan-created videos on social media","Zerb started producing at age 14 after being inspired by Skrillex and Deadmau5","Vocalist Ink has worked with Beyoncé, Justin Bieber, Childish Gambino, and Stevie Wonder"],"tragedy_or_meaning":"\"Addicted\" captures the intoxicating rush of nightlife and connection — that feeling of being completely consumed by the energy of a moment, a song, or a person. It channels the universal experience of losing yourself on the dance floor, where the music becomes everything and the outside world temporarily ceases to exist.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/58/Post_Malone_-_Hollywood%27s_Bleeding.png","artist_origin":"São Paulo, Brazil","track_made_in":"São Paulo, Brazil"},{"id":48,"title":"Before Fall","artist":"Steven","album":"Single","year":2018,"listens":107,"duration":"1:22","song_history":"\"Before Fall\" is a brief, emotionally concentrated track by independent artist Steven that packs powerful feeling into just 82 seconds. The song's minimalist approach — saying everything that needs to be said without excess — gives it a raw, unpolished intimacy that connects directly with listeners seeking authentic emotional expression.","artist_info":"Steven is an independent artist who creates emotionally honest, minimalist music. Operating outside the mainstream music industry, his work prioritizes genuine feeling over production polish, allowing raw emotion to be the primary vehicle of connection with listeners.","artist_history":"As an independent artist, Steven represents the growing movement of musicians who share deeply personal work through digital platforms without major label backing. His presence on personal playlists speaks to the power of authentic, uncompromising artistic expression to find its audience organically.","cool_facts":["At just 1:22, the song is one of the shortest on the playlist — proving that emotional impact doesn't require length","The track represents the independent music movement where artists prioritize authentic expression over commercial viability","Its inclusion on a heavily-played personal playlist shows how brief moments of music can carry enormous personal significance"],"tragedy_or_meaning":"\"Before Fall\" exists in that liminal space before everything changes — the calm before the storm, the last breath before the plunge. At barely over a minute, it captures a moment frozen in time, the way certain feelings are so intense they can only be sustained briefly before becoming overwhelming.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/7/73/Places_We_Don%27t_Know_Kasbo.jpeg","artist_origin":"USA","track_made_in":"USA"},{"id":49,"title":"Pac Ave","artist":"Diggy Graves","album":"Single","year":2023,"listens":106,"duration":"3:31","song_history":"\"Pac Ave\" was released in September 2023 as a single by Diggy Graves, continuing his exploration of personal storytelling through his signature horrorcore-influenced hip-hop style. The track represents his ability to blend narrative-driven lyrics with atmospheric production, creating a vivid sense of place tied to specific locations and memories.","artist_info":"Diggy Graves is an American rapper and performer from the Pacific Northwest known for his masked persona and genre-blending approach that fuses horrorcore with rap, trap, cloud rap, and emo-rap. His lyrics draw from horror movies, literature, and personal experiences, creating a unique space in modern hip-hop.","artist_history":"Diggy Graves created his masked persona in 2020 and quickly built a following through TikTok and streaming platforms. Based in Tacoma, Washington, he's known for tracks like 'Red Vineyard,' 'Circus Psycho,' and 'Cute Girl,' earning recognition as a hip-hop artist who brings authenticity and depth to the alternative rap genre.","cool_facts":["The song's title 'Pac Ave' refers to Pacific Avenue, grounding the track in specific geographic identity","Diggy Graves draws lyrical inspiration from Stephen King novels and horror cinema","He represents the Tacoma, Washington hip-hop scene, bringing Pacific Northwest energy to the genre"],"tragedy_or_meaning":"\"Pac Ave\" channels the weight of place — how specific streets and neighborhoods hold our memories, our growth, and our pain. Named after a real avenue, the song explores how the places we come from shape who we become, carrying both the beauty and the hardship of where we started.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music113/v4/7b/3e/f9/7b3ef9c5-3dc9-b5c6-0e6d-51db12b6b5c5/19UMGIM90289.rgb.jpg/600x600bb.jpg","artist_origin":"Tacoma, Washington, USA","track_made_in":"Tacoma, Washington, USA"},{"id":50,"title":"Red Vineyard","artist":"Diggy Graves","album":"Single","year":2024,"listens":101,"duration":"3:16","song_history":"\"Red Vineyard\" was released in 2024 and stands as one of Diggy Graves' most popular songs. The track showcases his evolution as an artist, blending his horror-inspired aesthetics with more personal, introspective themes. Its title evokes imagery of both beauty and something slightly sinister — a vineyard that runs red, suggesting hidden depths beneath a surface of natural beauty.","artist_info":"Diggy Graves is an American rapper from Tacoma, Washington who blends horrorcore with alternative hip-hop, wearing a signature mask as part of his artistic identity. His official bio states he's been making music 'for most of his life,' and his most popular songs include 'Red Vineyard' and 'Circus Psycho.'","artist_history":"Since creating his persona in 2020, Diggy Graves has steadily built his catalog and fanbase through consistent releases and social media engagement. His music resonates with fans looking for authenticity and depth in hip-hop, and his appearance on this playlist three times (tracks 23, 49, and 50) speaks to how deeply his music connects with dedicated listeners.","cool_facts":["'Red Vineyard' is listed as one of Diggy Graves' most popular songs on his official website","The title may reference Van Gogh's famous painting 'The Red Vineyard,' connecting visual art to his musical storytelling","Diggy Graves appears three times on this playlist, showing the deep connection his music creates with loyal listeners"],"tragedy_or_meaning":"\"Red Vineyard\" evokes the duality of beauty and darkness — like a vineyard whose beauty hides the labor and struggle beneath. The red imagery suggests passion, blood, and intensity, creating a song that lives in the space between the beautiful and the unsettling, much like Diggy Graves' entire artistic identity.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music128/v4/f4/c6/b8/f4c6b804-e760-e498-0c68-6c00ceb4eb23/075679896988.jpg/600x600bb.jpg","artist_origin":"Tacoma, Washington, USA","track_made_in":"Tacoma, Washington, USA"},{"id":51,"title":"All We Need","artist":"Witchz","album":"Single","year":2022,"listens":101,"duration":"3:12","song_history":"\"All We Need\" was released as a demo single in 2022 by the independent artist WITCHZ. The track blends bass-heavy production with bleak, emotive vocals, showcasing WITCHZ's signature dark songwriting style that reintroduces guitars into modern electronic-influenced music.","artist_info":"WITCHZ is a solo project that delivers bass-heavy production paired with bleak vocals, showcasing the dark side of songwriting. The artist is known for reintroducing guitars into modern music in a unique way that blends alternative rock energy with electronic production sensibilities.","artist_history":"WITCHZ emerged as an independent artist carving out a niche in the space between alternative rock and electronic music. The project has steadily built a catalog of emotionally intense tracks, gaining a devoted underground following through streaming platforms and consistent releases.","cool_facts":["WITCHZ is described as reintroducing guitars into modern music 'like no one else is doing'","The project explores the dark side of songwriting while maintaining musical accessibility","WITCHZ operates as a solo project, handling both production and vocals independently"],"tragedy_or_meaning":"\"All We Need\" speaks to the universal longing for connection and simplicity in a complicated world. The track resonates with listeners who find comfort in stripped-down emotional honesty, channeling vulnerability into something powerful and cathartic.","artwork_url":"","artist_origin":"USA","track_made_in":"USA"},{"id":52,"title":"Cabin Fever","artist":"Diggz","album":"Single","year":2020,"listens":99,"duration":"2:59","song_history":"\"Cabin Fever\" was produced by Diggz, an artist who blends emotive dance tracks with pop-influenced production. The song captures the restless energy of feeling trapped, channeling that tension into a driving musical experience crafted by Diggz alongside collaborator Gabe Rizza.","artist_info":"Diggz is an independent music producer and DJ who creates emotive dance tracks with pop influences. His sound bridges the gap between club-ready electronic music and emotionally resonant songwriting, with production work alongside super producer Gabe Rizza.","artist_history":"Diggz has built a career as both a producer and performing DJ, releasing music through his own Diggztown Music imprint. He continues to produce and regularly DJs, building a catalog of dance and pop-influenced tracks that have found audiences through streaming platforms.","cool_facts":["Diggz runs his own label called Diggztown Music","He regularly collaborates with super producer Gabe Rizza","Diggz is both a producer and active performing DJ"],"tragedy_or_meaning":"\"Cabin Fever\" captures the universal feeling of restlessness and confinement, resonating deeply with anyone who has felt the walls closing in. The track transforms that anxious energy into something liberating through its driving rhythm and release.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music128/v4/09/f8/01/09f801c9-52c6-2d23-c6ef-7bc9bceabe04/886446907901.jpg/600x600bb.jpg","artist_origin":"Australia","track_made_in":"Australia"},{"id":53,"title":"Ghostkeeper","artist":"Klangkarussell","album":"Single","year":2020,"listens":97,"duration":"5:31","song_history":"\"Ghostkeeper\" was released on February 21, 2020 as a collaboration between Klangkarussell and vocalist GIVVEN. The track showcases the duo's hypnotic production style, with sounds and harmonies that wind in and out of each other in a tantalizing, beautiful arrangement that fans have described as deeply captivating.","artist_info":"Klangkarussell (German for 'Sound Carousel') is an Austrian electronic music duo formed in 2011 in Salzburg. Consisting of Tobias Rieser and Adrian Held, their sound incorporates melodic tech-house with guest vocals, live instruments, and samples, creating layered and revolving sonic landscapes.","artist_history":"Tobias Rieser and Adrian Held were school friends in Salzburg before forming Klangkarussell. Their biggest hit 'Sonnentanz' brought them international recognition. Over a decade of making music together, they've become masters of emotion in electronic music, performing at major venues across Europe.","cool_facts":["Their name 'Klangkarussell' translates to 'Sound Carousel' in English, reflecting their revolving production style","Their hit 'Sonnentanz' became an international dance anthem","Adrian Held began learning music production at age 16, while Tobias was the son of a music teacher"],"tragedy_or_meaning":"\"Ghostkeeper\" explores themes of memory and whether our shared stories will ever be enough. The lyrics ask haunting questions about holding onto the past, resonating with anyone who has felt like a guardian of fading memories and the stories of love that once were.","artwork_url":"","artist_origin":"Salzburg, Austria","track_made_in":"Salzburg, Austria"},{"id":54,"title":"In The End (Mellen Gi Remix)","artist":"Tommee Profitt","album":"In the End - EP","year":2019,"listens":97,"duration":"3:38","song_history":"Released on March 22, 2019, this remix transforms Tommee Profitt's cinematic cover of Linkin Park's 'In The End' (featuring vocalist Fleurie) into a powerful electronic reimagining by Russian producer Mellen Gi. The original cinematic version had already gained massive popularity in film and TV placements before the remix took it viral.","artist_info":"Tommee Profitt is an American cinematic music producer from Michigan who creates epic, orchestral-meets-modern productions. He is known for his dramatic reimaginings of popular songs and original compositions that have been featured in countless film trailers, TV shows, and video games.","artist_history":"Profitt taught himself piano as a child and began producing music at age 12 in Grand Rapids, Michigan. He moved to Nashville/Franklin, Tennessee to pursue his career and has since amassed over 25 billion global lifetime streams. He worked on production for rapper NF before pivoting to cinematic music that has made him one of the most sync-licensed artists in the industry.","cool_facts":["Mellen Gi's remix of the Linkin Park cover has accumulated over 900 million YouTube views","Tommee Profitt started producing his own music at just 12 years old","Mellen Gi is a young Russian producer who specializes in electronic and downtempo music"],"tragedy_or_meaning":"This track carries the emotional weight of Linkin Park's original meditation on effort and futility, reimagined through a cinematic lens and then electrified by Mellen Gi's remix. For many listeners, it serves as both a tribute to Chester Bennington's legacy and a powerful anthem for perseverance.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music118/v4/bd/c5/85/bdc58525-3276-5f00-f1d3-5c8b9da3753c/886446589596.jpg/600x600bb.jpg","artist_origin":"Grand Rapids, Michigan, USA","track_made_in":"Nashville, Tennessee, USA"},{"id":55,"title":"Capsize","artist":"FREEDO","album":"Single","year":2020,"listens":96,"duration":"3:58","song_history":"FREEDO's \"Capsize\" showcases the Swiss producer's talent for creating pristine pop soundscapes with luscious production. The track demonstrates his ability to connect feverish chart fans, club-goers, and pop culture critics through his blend of accessible melody and sophisticated production.","artist_info":"FREEDO (Fridolin Walcher) is a Swiss songwriter, record producer, and DJ known for creating pristine pop and luscious soundscapes. He often collaborates with German producer Shuko (Christoph Bauss) and is recognized for producing major pop hits across multiple genres.","artist_history":"FREEDO rose to international prominence as one of the producers behind Zara Larsson's massive hit 'Lush Life,' which charted in the top five in 18 countries. He also produced The Chainsmokers' single 'Takeaway' and created a notable remix of Coldplay's 'Up&Up,' establishing himself as a versatile force in pop production.","cool_facts":["FREEDO co-produced Zara Larsson's 'Lush Life,' one of the best-selling songs of the 2010s in the UK","He produced The Chainsmokers' hit single 'Takeaway'","His remix of Coldplay's 'Up&Up' gained significant attention in 2016"],"tragedy_or_meaning":"\"Capsize\" evokes the overwhelming feeling of being pulled under by emotion, whether through love, loss, or the weight of the world. The production builds like a rising tide, capturing that moment when feelings become too powerful to contain and you simply surrender to them.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/4/4d/Lowlife_%28Single_Cover%29.jpg","artist_origin":"Switzerland","track_made_in":"Switzerland"},{"id":56,"title":"A Toast to the Ghost","artist":"Diggz","album":"Single","year":2020,"listens":96,"duration":"3:26","song_history":"\"A Toast to the Ghost\" is another emotionally charged track from Diggz's catalog, blending his signature dance production with introspective themes. The song raises a glass to the memories and people who have become ghosts in our lives, wrapped in compelling electronic production.","artist_info":"Diggz is an independent music producer and DJ who creates emotive dance tracks with pop influences. His sound bridges the gap between club-ready electronic music and emotionally resonant songwriting, working alongside collaborator Gabe Rizza.","artist_history":"Diggz has built a career as both a producer and performing DJ, releasing music through his own Diggztown Music imprint. His consistent output of emotionally-driven dance tracks has earned him a loyal following among listeners who appreciate depth in electronic music.","cool_facts":["Diggz has multiple tracks on this playlist, showing his consistent quality","He produces what he calls 'emotive dance tracks with pop licks'","His music bridges the gap between dancefloor energy and emotional storytelling"],"tragedy_or_meaning":"\"A Toast to the Ghost\" is a bittersweet celebration of people and moments that have passed from our lives. It captures the complex emotion of honoring what's gone while continuing to move forward — raising a glass to the beautiful ghosts that shaped who we are.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music125/v4/e8/56/cf/e856cf89-b7eb-a413-e6f2-8ceb7ed8c7f5/886447040904.jpg/600x600bb.jpg","artist_origin":"Australia","track_made_in":"Australia"},{"id":57,"title":"Lost at Sea","artist":"Mosaé","album":"Single","year":2023,"listens":96,"duration":"2:25","song_history":"\"Lost at Sea\" was released as a single in May 2023, showcasing Mosaé's ability to create emotionally evocative music in a compact format. The track demonstrates the artist's talent for crafting atmospheric soundscapes that transport listeners to an emotional landscape of isolation and searching.","artist_info":"Mosaé is an emerging independent artist who creates atmospheric, emotionally-driven music. Their catalog includes tracks like 'Let You Go,' 'Far Away,' and 'inmymind,' building a body of work that explores themes of distance, memory, and inner reflection through modern electronic-influenced production.","artist_history":"Mosaé has been steadily releasing singles since the early 2020s, building a growing catalog of atmospheric tracks. As an independent artist, they've cultivated a following through streaming platforms, with 'Lost at Sea' becoming one of their most recognized works.","cool_facts":["The song packs powerful emotional storytelling into just 2 minutes and 25 seconds","Mosaé's catalog explores consistent themes of distance and searching","The artist has continued releasing music through 2025-2026, showing steady career growth"],"tragedy_or_meaning":"\"Lost at Sea\" captures the profound feeling of being adrift in life — disconnected from shore, from purpose, from the people we love. In just over two minutes, it distills that overwhelming sense of isolation into something hauntingly beautiful, reminding listeners they're not alone in feeling lost.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music128/v4/cd/5e/a0/cd5ea024-b349-94d3-3648-2b6ecc3c0d42/00602557879704.rgb.jpg/600x600bb.jpg","artist_origin":"USA","track_made_in":"USA"},{"id":58,"title":"Rock n Roll","artist":"Lil","album":"Single","year":2023,"listens":95,"duration":"2:38","song_history":"\"Rock n Roll\" blends hip-hop energy with rock-influenced attitude, capturing the rebellious spirit its title promises. The track delivers high-energy production that crosses genre boundaries, embodying the raw, unapologetic energy that both rock and rap share at their core.","artist_info":"Lil is an independent artist operating in the space where hip-hop meets rock energy. Their sound channels the boundary-breaking spirit of genre fusion, combining hard-hitting beats with the attitude and intensity traditionally associated with rock music.","artist_history":"As an independent artist, Lil represents the new generation of musicians who refuse to be confined by genre labels. Their work reflects the increasingly fluid boundaries in modern music where hip-hop production, rock attitude, and electronic elements converge freely.","cool_facts":["The track embodies the genre-blending spirit of modern music","At just 2:38, it delivers maximum energy in a compact package","The song reflects the growing trend of hip-hop and rock crossover in the 2020s"],"tragedy_or_meaning":"\"Rock n Roll\" is an anthem of defiance and self-expression, channeling the timeless rebellious energy that has always made both rock and hip-hop powerful forces for youth culture. It speaks to anyone who refuses to conform and wants to live life on their own terms.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music125/v4/c3/0c/5c/c30c5c52-20cb-8b30-4f71-08f92e0d2f76/3610159721885.jpg/600x600bb.jpg","artist_origin":"USA","track_made_in":"USA"},{"id":59,"title":"My Way","artist":"Scott Rill","album":"Single","year":2021,"listens":94,"duration":"2:45","song_history":"\"My Way\" is a standout track from Ukrainian producer Scott Rill, featuring vocalist Lima Osta. The song showcases his signature blend of deep house and melodic bass that has earned him massive streaming numbers, combining driving rhythms with emotional vocal work.","artist_info":"Scott Rill is a Ukrainian electronic music producer from the small town of Uzhhorod. He creates a blend of deep house, slap house, and melodic bass music that has resonated with millions of listeners worldwide, known for his ability to craft catchy, emotionally engaging dance tracks.","artist_history":"Scott Rill began producing music in 2018, experimenting with different sounds on his computer. His dedication quickly paid off — he has amassed over 100 million views on YouTube and surpassed 1.8 million monthly listeners on Spotify, establishing himself as one of Eastern Europe's most exciting electronic producers.","cool_facts":["Scott Rill is from the small Ukrainian town of Uzhhorod","He started producing in 2018 and quickly amassed over 100 million YouTube views","He has surpassed 1.8 million monthly listeners on Spotify"],"tragedy_or_meaning":"\"My Way\" is a declaration of independence and self-determination — choosing your own path regardless of external pressure. For a young producer from a small Ukrainian town who built a global following through sheer determination, the title carries personal weight and inspires listeners to forge their own journeys.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/2/2d/Hit-Sale-single-cover.jpg","artist_origin":"Uzhhorod, Ukraine","track_made_in":"Uzhhorod, Ukraine"},{"id":60,"title":"Too Many Nights","artist":"Metro Boomin","album":"Heroes & Villains","year":2022,"listens":94,"duration":"3:20","song_history":"\"Too Many Nights\" was released in December 2022 as part of Metro Boomin's blockbuster album 'Heroes & Villains.' The track features Future and Don Toliver, co-produced with Honorable C.N.O.T.E. and Allen Ritter. Its cinematic music video, released in April 2023, showcases the trio in neon-lit nightlife settings.","artist_info":"Metro Boomin (Leland Tyler Wayne) is an American record producer widely acclaimed for his dark, cinematic production style. He is regarded as one of the most influential producers in contemporary hip-hop and trap music, known for his signature tag 'Metro Boomin want some more.'","artist_history":"Raised in St. Louis, Missouri, Metro began producing at age 13 after his mother bought him a laptop with FL Studio. He moved to Atlanta in 2012 to attend Morehouse College, where he connected with artists like Future, Young Thug, and 21 Savage. His album 'Heroes & Villains' also spawned the Platinum hit 'Creepin'' with The Weeknd and 21 Savage.","cool_facts":["Metro Boomin started producing at age 13 and would create up to five beats a day as a teenager","Heroes & Villains also contains the Platinum-certified 'Creepin'' with The Weeknd","Don Toliver showcases impressive dance moves in the song's cinematic music video"],"tragedy_or_meaning":"\"Too Many Nights\" captures the restless energy of late-night life — the intoxicating pull of nightlife that keeps you out when you know you should go home. It resonates with anyone who has lost themselves in too many nights out, searching for something they can't quite name.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/58/Post_Malone_-_Hollywood%27s_Bleeding.png","artist_origin":"St. Louis, Missouri, USA","track_made_in":"Atlanta, Georgia, USA"},{"id":61,"title":"Demons","artist":"Ondi Vil","album":"Single","year":2020,"listens":94,"duration":"2:24","song_history":"\"Demons\" was released on September 4, 2020 as a collaboration between Ondi Vil, Neoplasma, and vocalist Gina Livia. The track represents the lo-fi bedroom producer aesthetic, crafted in intimate settings and channeling inner darkness into atmospheric electronic music.","artist_info":"Ondi Vil is an independent bedroom producer who creates beats in solitude, describing himself simply as someone who 'makes beats in my bedroom when I'm alone.' His sound lives in the space between lo-fi electronic music and atmospheric, emotionally-driven production.","artist_history":"Ondi Vil has been releasing music since around 2018, building a catalog of atmospheric electronic tracks through collaborations with various vocalists and producers. Working from his bedroom studio, he represents the democratization of music production in the streaming era.","cool_facts":["Ondi Vil describes himself as someone who 'makes beats in my bedroom when I'm alone'","The track is a three-way collaboration with Neoplasma and vocalist Gina Livia","The song packs its emotional punch into just 2 minutes and 24 seconds"],"tragedy_or_meaning":"\"Demons\" confronts the internal battles we all face — the dark thoughts and struggles that come alive in our quietest moments. Created from a place of solitary introspection, it offers listeners permission to acknowledge their own demons while finding solidarity in shared vulnerability.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music123/v4/eb/e0/d6/ebe0d6b2-e19c-5b1c-3c92-8b3e1a97dbc0/20UMGIM21065.rgb.jpg/600x600bb.jpg","artist_origin":"Greece","track_made_in":"Greece"},{"id":62,"title":"High Like This","artist":"Yves","album":"Single","year":2020,"listens":92,"duration":"2:49","song_history":"\"High Like This\" was released on October 2, 2020 through Spinnin' Records as a collaboration between Belgian DJ Yves V and German rising artist FR!ES. The track delivers a deep slice of slap house with raw sensibilities and white-hot interpretations of the house genre.","artist_info":"Yves V (Yves Van Geertsom) is a Belgian DJ and producer from Antwerp, known as a mainstage resident at Tomorrowland festival. His sound encompasses high-energy anthems and festival house music that has dominated dance charts and festival stages worldwide.","artist_history":"Yves V made his Tomorrowland debut in 2007 and has remained a regular presence at the festival ever since, performing 8 times on its mainstage alongside Dimitri Vegas & Like Mike. He began releasing tracks in 2008 and has built a career spanning nearly two decades of electronic dance music.","cool_facts":["Yves V is a resident DJ at Tomorrowland, having performed on the mainstage 8 times","The track was released on the prestigious Spinnin' Records label","FR!ES is a German rising artist who brought raw slap house sensibilities to the collaboration"],"tragedy_or_meaning":"\"High Like This\" captures the euphoric rush of transcendent moments — whether through music, love, or pure adrenaline. It's a celebration of those peak experiences that make us feel invincible, speaking to anyone who has chased the feeling of being elevated beyond the everyday.","artwork_url":"","artist_origin":"Antwerp, Belgium","track_made_in":"Antwerp, Belgium"},{"id":63,"title":"Shameless","artist":"Cam","album":"Untamed","year":2015,"listens":92,"duration":"3:40","song_history":"\"Shameless\" appears on Cam's debut major-label album 'Untamed,' released December 11, 2015. The album was mainly produced by Jeff Bhasker and Tyler Johnson, with Cam herself co-producing. It showcases her fearless approach to country music that defied Nashville conventions.","artist_info":"Cam (Camaron Marvel Ochs) is an American country music singer and songwriter from California. Known for her bold, independent approach to country music, she has also written songs for Beyoncé, Sam Smith, and Miley Cyrus, showcasing her versatility as a songwriter.","artist_history":"Cam broke through in 2015 with 'Burning House,' a subdued but smoldering ballad that defied modern notions of how women in Nashville could succeed. Her album 'Untamed' peaked at #2 on Billboard's country albums chart and #12 on the Billboard 200. She wrote and recorded most of her debut LP before she even had a record deal.","cool_facts":["Cam wrote songs for Beyoncé, Sam Smith, and Miley Cyrus before her solo breakthrough","She wrote and recorded most of 'Untamed' before having a record deal","Her hit 'Burning House' was inspired by a dream about rescuing her boyfriend from a fire"],"tragedy_or_meaning":"\"Shameless\" embodies Cam's fearless, unapologetic approach to both music and life. It speaks to the courage of being vulnerably honest about who you are and what you want, without pretense or apology — a powerful message for anyone learning to own their truth.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music/v4/43/6f/c7/436fc7c0-9a94-4a88-d498-1d4a04ee12a9/5054526800281_1_1.jpg/600x600bb.jpg","artist_origin":"Lafayette, California, USA","track_made_in":"Nashville, Tennessee, USA"},{"id":64,"title":"Halloween Never...","artist":"Diggz","album":"Single","year":2020,"listens":92,"duration":"3:24","song_history":"\"Halloween Never...\" is a thematic track from Diggz that channels the energy and atmosphere of Halloween into an electronic production. The song demonstrates Diggz's ability to create concept-driven tracks that pair seasonal or thematic imagery with his signature emotive dance production.","artist_info":"Diggz is an independent music producer and DJ who creates emotive dance tracks with pop influences. Operating through his Diggztown Music imprint, he bridges the gap between club-ready electronic music and emotionally resonant, sometimes darkly-themed songwriting.","artist_history":"Diggz has built a diverse catalog that ranges from party anthems to darker, more atmospheric tracks like 'Halloween Never...' His willingness to explore different moods and themes within electronic music has helped him maintain a consistent and engaged listener base.","cool_facts":["The track shows Diggz's range in exploring darker, more atmospheric territory","Diggz has five tracks on this playlist alone, demonstrating remarkable consistency","The ellipsis in the title suggests an unfinished thought, adding mystery to the track"],"tragedy_or_meaning":"\"Halloween Never...\" taps into the allure of darkness and the supernatural, capturing how some people feel most alive when exploring the shadows. It resonates with those who find beauty in the eerie and mysterious, embracing the darkness rather than fearing it.","artwork_url":"","artist_origin":"Australia","track_made_in":"Australia"},{"id":65,"title":"you broke me first","artist":"Tate McRae","album":"Too Young to Be Sad","year":2020,"listens":92,"duration":"2:49","song_history":"\"you broke me first\" was released on April 17, 2020 through RCA Records as the lead single from Tate McRae's EP 'Too Young to Be Sad.' Written in January 2020 during her last in-person writing session before the pandemic, the song exploded on TikTok where it featured in over a million videos.","artist_info":"Tate McRae is a Canadian singer, songwriter, and dancer who first gained attention on YouTube at age 9 with dance videos. She signed with RCA Records after her bedroom-recorded song 'One Day' caught the label's attention, launching her from internet creator to global pop star.","artist_history":"McRae started uploading dance videos to YouTube at age 9 and launched her 'Create With Tate' series showcasing original songs in 2017. She signed with RCA in 2019 at age 16, and 'you broke me first' became her first Billboard Hot 100 entry, peaking at #17. Her EP became the most-streamed female EP of 2021 on Spotify.","cool_facts":["The song was written during Tate's last in-person writing session before pandemic lockdowns","It gained viral popularity on TikTok with over a million videos using the sound","Tate McRae's EP became the most-streamed female EP of 2021 on Spotify"],"tragedy_or_meaning":"Tate described the song as being 'about someone in a relationship who couldn't care less for the other person and then 6 months later decides to crawl back.' It captures the empowering moment of not letting someone back in after they've already broken you — resonating with millions who've experienced that same emotional boundary.","artwork_url":"","artist_origin":"Calgary, Alberta, Canada","track_made_in":"Los Angeles, California, USA"},{"id":66,"title":"NUMB","artist":"Ryan","album":"Single","year":2021,"listens":92,"duration":"3:36","song_history":"\"NUMB\" is a track that explores emotional numbness and disconnection through modern production. The song channels the feeling of being overwhelmed to the point of shutting down, wrapping heavy themes in accessible musical production.","artist_info":"Ryan is an independent artist whose work explores themes of emotional struggle and resilience through modern music production. Their sound reflects the introspective, vulnerable approach to songwriting that has defined a generation of bedroom-to-streaming artists.","artist_history":"As an independent artist in the streaming era, Ryan represents the wave of musicians who build their careers through digital platforms, connecting directly with listeners who find solace in honest, emotionally raw music.","cool_facts":["The track title 'NUMB' in all caps emphasizes the intensity of the emotional state described","The song addresses themes of emotional overwhelm that resonate across generations","At 3:36, the track takes its time building emotional atmosphere"],"tragedy_or_meaning":"\"NUMB\" speaks to the defense mechanism of emotional shutdown — when life becomes so overwhelming that feeling nothing seems safer than feeling everything. It resonates deeply with listeners experiencing burnout, heartbreak, or emotional exhaustion, offering validation that this state is real and shared.","artwork_url":"https://is1-ssl.mzstatic.com/image/thumb/Music122/v4/d3/d7/06/d3d70696-c09d-ecb2-5e46-05ee9f52f14a/886446278360.jpg/600x600bb.jpg","artist_origin":"USA","track_made_in":"USA"},{"id":67,"title":"In The Air Tonight","artist":"Phil Collins","album":"Face Value","year":1981,"listens":92,"duration":"5:36","song_history":"Written in 1980 during the collapse of Phil Collins' first marriage, 'In The Air Tonight' was recorded in a makeshift home studio in his bedroom. Co-produced with Hugh Padgham, the song famously features gated reverb drums — a sound discovered by accident when a ceiling microphone with heavy compression picked up Collins' drum sound during a Peter Gabriel session.","artist_info":"Phil Collins is an English singer, drummer, songwriter, and actor who served as both drummer and later lead singer of Genesis. As a solo artist, he achieved seven US #1 singles and has sold over 150 million records worldwide, making him one of the best-selling artists of all time.","artist_history":"Collins began as a child actor before joining Genesis in 1970 as their drummer. When Peter Gabriel left in 1975, Collins became lead singer while continuing to drum. His solo debut 'Face Value' (1981) launched one of the most successful solo careers in music history, spanning multiple decades and genres from pop to R&B.","cool_facts":["The iconic drum fill was improvised in one take — Collins later said 'I just did it'","The gated reverb sound was discovered by accident and defined the sound of the entire 1980s","Collins is one of only three artists to sell 100+ million albums both solo and with a band"],"tragedy_or_meaning":"Born from the raw pain of divorce, 'In The Air Tonight' channels anger, betrayal, and isolation into one of music's most atmospheric tracks. The legendary drum break hits like an emotional catharsis — four minutes of building tension released in an explosive moment that has haunted listeners for over 40 years.","artwork_url":"","artist_origin":"London, England, UK","track_made_in":"London, England, UK"},{"id":68,"title":"I Remember","artist":"Tristam","album":"Monstercat 007 - Solace","year":2012,"listens":92,"duration":"3:57","song_history":"\"I Remember\" was released on May 28, 2012 as the 17th track on Monstercat's 007 - Solace compilation album. The track is widely considered one of the best songs not only on the album but across the entire Monstercat label catalog, representing a high point in the label's early era.","artist_info":"Tristam (Leandre Bérubé Bergeron) is a Canadian electronic music producer and singer from St. Isidore, Alberta. He is known for his releases on the Monstercat label spanning dubstep, electro house, and drum & bass, combining powerful production with emotional vocal delivery.","artist_history":"Born in 1995, Tristam grew up playing guitar before developing a passion for piano and electronic production. He was discovered by Monstercat who messaged him to join their label, and he has been releasing on the platform since 2011 with his single 'Party For The Living.' He later relocated from Alberta to Vancouver to pursue music.","cool_facts":["Tristam was invited to join Monstercat after the label messaged him directly","Monstercat 007 - Solace is widely considered one of the best Monstercat compilation albums","He collaborated with Braken on the massively popular tracks 'Frame of Mind' and 'Flight'"],"tragedy_or_meaning":"\"I Remember\" evokes the power of memory and nostalgia — recalling moments of intensity and meaning from the past. Listeners have interpreted it through many lenses, from surviving difficult times to honoring victories, making it a deeply personal track that means something different to everyone who hears it.","artwork_url":"","artist_origin":"St. Isidore, Alberta, Canada","track_made_in":"Alberta, Canada"},{"id":69,"title":"Let Me Touch You","artist":"ARIZONA","album":"Gallery","year":2017,"listens":91,"duration":"3:39","song_history":"The track (likely 'Let Me Touch Your Fire') was part of ARIZONA's body of work released through Atlantic Records. It showcases the band's signature blend of hazy guitar chords, airy electronics, and impressive vocals that defined their electropop sound and earned them devoted fans.","artist_info":"ARIZONA (stylized as A R I Z O N A) was an American pop rock and electropop band from New Jersey, despite their name. The trio consisted of Zachary Charles (lead vocals), Nate Esquite (guitar), and David Labuguen (keys), creating sun-soaked electronic pop with indie sensibilities.","artist_history":"Originally signed to Atlantic Records, ARIZONA released their debut album 'Gallery' in May 2017, which peaked at #4 on Top Heatseekers. They toured with Panic! At The Disco and released their second album 'Asylum' in 2019. Their blend of electropop and indie rock earned them a passionate following.","cool_facts":["Despite their name, the band is actually from New Jersey, not Arizona","They toured with Panic! At The Disco during the 'Pray for the Wicked' tour","Their debut album peaked at #4 on Billboard's Top Heatseekers chart"],"tragedy_or_meaning":"The song's lyrics describe the vulnerability of reaching out for warmth and connection when feeling cold and tired. It captures the courageous act of asking someone to let you in — to share their fire — resonating with anyone who has been brave enough to ask for the love they need.","artwork_url":"","artist_origin":"New Jersey, USA","track_made_in":"New Jersey, USA"},{"id":70,"title":"Marivanna","artist":"TEPLAY","album":"Single","year":2021,"listens":91,"duration":"2:45","song_history":"\"Marivanna\" is a track by TEPLAY that blends electronic elements with Russian-language music traditions. The song showcases the producer's ability to create catchy, rhythmically compelling dance music that bridges Eastern European musical sensibilitie ning clever lyricism with accessible hooks.","artist_history":"Born October 13, 1988, Webby built a massive fanbase through mixtapes including the DJ Drama-hosted 'Bars On Me.' His EP 'There Goes the Neighborhood' peaked at #101 on the Billboard 200 in 2011. He has collaborated with Mac Miller, Method Man, Tech N9ne, and Busta Rhymes while maintaining his independent spirit.","cool_facts":["Chris Webby has collaborated with hip-hop legends including Method Man, DMX, and Busta Rhymes","His EP peaked at #101 on Billboard 200 while remaining fully independent","He calls his devoted fans 'ninjas' and has built a massive grassroots following through live shows"],"tragedy_or_meaning":"\"GOTTI\" channels the confidence and ambition of its namesake, representing Webby's unapologetic approach to his craft. For an independent artist who turned a college dismissal into fuel for a full-time music career, it's a declaration of self-made success and refusal to accept limitations.","artwork_url":"","artist_origin":"Norwalk, Connecticut, USA","track_made_in":"Norwalk, Connecticut, USA"},{"id":72,"title":"The Last Goodbye","artist":"ODESZA","album":"The Last Goodbye","year":2022,"listens":90,"duration":"5:59","song_history":"\"The Last Goodbye\" was released February 8, 2022 as the lead single and title track from ODESZA's fourth album. The track features a sample of soul legend Bettye LaVette's vocals, blending vintage soul with ODESZA's signature electronic production to create something timeless and emotionally powerful.","artist_info":"ODESZA is an American electronic duo consisting of Harrison Mills and Clayton Knight, known for their lush, emotionally-driven electronic music. Their sound encompasses a wider, more melodic palette than typical EDM, incorporating their own piano and guitar playing into sophisticated productions.","artist_history":"Mills and Knight met as freshmen at Western Washington University and formed ODESZA in 2012 just before graduating. From their debut 'Summer's Gone' to their Grammy-nominated 'The Last Goodbye,' they've become leaders in indie electronic music, evolving from college bedroom producers to arena-headlining artists.","cool_facts":["The track features a sample of legendary soul singer Bettye LaVette","The album was nominated for Best Dance/Electronic Album at the 65th Grammy Awards","Mills studied graphic design while Knight studied physics and mathematics before forming ODESZA"],"tragedy_or_meaning":"\"The Last Goodbye\" is about the pain of letting go — the finality of an ending and the vulnerable request to be let down gently. By pairing Bettye LaVette's soulful vocals with their production, ODESZA created a track that spans generations of heartbreak, making the universal experience of farewell feel both epic and intimate.","artwork_url":"","artist_origin":"Bellingham, Washington, USA","track_made_in":"Bellingham, Washington, USA"},{"id":73,"title":"Rx (Medicate)","artist":"Theory of a Deadman","album":"Wake Up Call","year":2017,"listens":90,"duration":"3:53","song_history":"\"Rx (Medicate)\" was released in July 2017 as the lead single from Theory of a Deadman's sixth album 'Wake Up Call.' Written by all four band members, the song directly addresses the prescription drug abuse epidemic in North America, marking a significant artistic evolution toward social commentary.","artist_info":"Theory of a Deadman is a Canadian rock band from North Delta, British Columbia, formed in 1999. Led by Tyler Connolly, the band evolved from post-grunge into more socially conscious rock, with nine singles reaching the top ten of the US Billboard Mainstream Rock chart.","artist_history":"The band was signed by Nickelback's Chad Kroeger to his 604 Records label after Connolly gave him a demo tape. They've released multiple albums since their 2002 debut, with four #1 Mainstream Rock hits including 'Rx (Medicate).' The band has rebranded simply as 'Theory,' reflecting their evolution from post-grunge to socially aware rock.","cool_facts":["The song reached #1 on the Billboard Mainstream Rock chart","It directly addresses the opioid epidemic in North America","The band was originally discovered and signed by Nickelback's Chad Kroeger"],"tragedy_or_meaning":"\"Rx (Medicate)\" confronts the devastating opioid crisis head-on, giving voice to those struggling with prescription drug addiction. Frontman Tyler Connolly spoke about how the song resonates because so many people have been personally affected — it's a rock anthem that carries genuine social weight and empathy for those suffering.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/a/a1/Post_Malone_-_Twelve_Carat_Toothache.png","artist_origin":"Delta, British Columbia, Canada","track_made_in":"Vancouver, British Columbia, Canada"},{"id":74,"title":"Hit Sale","artist":"Therapie TAXI","album":"Hit Sale","year":2018,"listens":89,"duration":"3:04","song_history":"\"Hit Sale\" was released in 2018 as both a single and the title track of Therapie TAXI's debut album. Featuring Belgian rapper Roméo Elvis, the song topped the Ultratop Wallonia Singles Chart and charted in France, becoming the band's signature track and breakthrough moment.","artist_info":"Therapie TAXI was a French musical group mixing pop, rock, and hip-hop, formed in 2016. Described as an 'acerbic mirror of youth,' the band reflected the disillusioned yet passionate spirit of their generation through French-language lyrics that were clever, witty, and culturally sharp.","artist_history":"Formed in 2016, Therapie TAXI released two albums and several singles before announcing their breakup in 2020. Despite their short career, they made a significant impact on the French music scene, with 'Hit Sale' becoming a defining track of the late 2010s French indie scene and demonstrating the power of genre-blending in francophone music.","cool_facts":["The song features Belgian rapper Roméo Elvis and topped Belgium's Wallonia chart","The band's name combines therapy and taxi — suggesting emotional journeys","Despite only being active from 2016-2020, they became one of France's most notable indie acts"],"tragedy_or_meaning":"\"Hit Sale\" (which loosely translates to 'Clearance Sale' or 'Hit for Sale') captures the disillusionment of a generation that sees everything as commodified. It speaks to youth who feel their authenticity is constantly being packaged and sold, yet the song's infectious energy turns that frustration into something celebratory and empowering.","artwork_url":"","artist_origin":"Paris, France","track_made_in":"Paris, France"},{"id":75,"title":"MAGIC IS REAL 2","artist":"Narovski","album":"Single","year":2021,"listens":88,"duration":"2:32","song_history":"\"MAGIC IS REAL 2\" is a continuation of Narovski's 'MAGIC IS REAL' series, showcasing the Lithuanian producer's talent for creating catchy electronic beats with an almost mystical quality. The track builds on the original's foundation with fresh energy and evolved production techniques.","artist_info":"Narovski is an electronic dance music artist from Lithuania who crafts catchy beats and infectious rhythms. Known for bringing a fresh sound to the dance music scene, their productions focus on electronic elements that create vibrant, energetic atmospheres for listeners.","artist_history":"Narovski has built a following as part of the growing Eastern European electronic music scene, releasing tracks that have found audiences through streaming platforms and social media. Their 'MAGIC IS REAL' series has become a signature of their catalog, blending optimism with danceable production.","cool_facts":["Narovski is from Lithuania, part of the thriving Baltic electronic music scene","The 'MAGIC IS REAL' series suggests a thematic project about wonder and belief","The track went viral on TikTok, expanding its reach beyond traditional dance music audiences"],"tragedy_or_meaning":"\"MAGIC IS REAL 2\" is a sonic affirmation that wonder still exists in the world. In an era of cynicism and information overload, the track serves as a reminder to believe in something greater — whether that's love, art, connection, or simply the transcendent power of music itself.","artwork_url":"","artist_origin":"Lithuania","track_made_in":"Lithuania"},{"id":76,"title":"Trick or Cheat","artist":"Diggz","album":"Single","year":2020,"listens":88,"duration":"2:58","song_history":"\"Trick or Cheat\" is another thematically creative track from Diggz's catalog, playing on Halloween imagery while exploring themes of deception in relationships. The song demonstrates his knack for clever wordplay in his track titles and his ability to merge playful concepts with deeper emotional content.","artist_info":"Diggz is an independent music producer and DJ creating emotive dance tracks through his Diggztown Music imprint. His music consistently bridges high-energy dance production with thoughtful, sometimes dark thematic content.","artist_history":"With multiple tracks spanning different moods and themes, Diggz has proven himself a versatile producer capable of delivering both party-ready bangers and more introspective pieces. His consistent output has earned him repeated appearances on curated playlists.","cool_facts":["The title cleverly combines 'Trick or Treat' with the concept of cheating","Diggz shows recurring interest in Halloween/dark themes across multiple tracks","This is one of five Diggz tracks on the Phoenix Playlist, showing deep listener loyalty"],"tragedy_or_meaning":"\"Trick or Cheat\" explores the deception and betrayal in relationships through a Halloween-themed lens. The title's wordplay captures the moment of discovering that what seemed like a treat was actually a trick — resonating with anyone who has been deceived by someone they trusted.","artwork_url":"","artist_origin":"Australia","track_made_in":"Australia"},{"id":77,"title":"Crawl Outta Love","artist":"ILLENIUM","album":"Awake","year":2017,"listens":87,"duration":"5:10","song_history":"\"Crawl es Diggz's most poetic side, exploring the paradox of feeling trapped while surrounded by love or beauty.","artist_info":"Diggz is an independent music producer and DJ known for creating emotive dance tracks through his Diggztown Music label. His music consistently pairs engaging dance production with thoughtful, sometimes contradictory thematic content.","artist_history":"Diggz has developed a distinctive artistic voice through his catalog of emotionally-driven electronic tracks. His ability to craft evocative titles and matching sonic landscapes has earned him a dedicated following among listeners who value both craft and feeling in their music.","cool_facts":["The title creates a powerful visual contrast between restraint and beauty","At just 2:20, it's one of the most concise tracks in Diggz's catalog","The juxtaposition of straitjackets and roses suggests love that feels both beautiful and confining"],"tragedy_or_meaning":"\"Straitjackets & Roses\" captures the duality of intense relationships — how love can simultaneously feel like freedom and captivity, beauty and madness. It speaks to anyone who has experienced a connection so overwhelming that it felt like both a gift and a prison.","artwork_url":"","artist_origin":"Australia","track_made_in":"Australia"},{"id":79,"title":"GASLIGHT!","artist":"Mag","album":"Single","year":2022,"listens":86,"duration":"2:28","song_history":"\"GASLIGHT!\" addresses the psychological manipulation tactic that has become a widely-discussed concept in modern relationships. The track channels the frustration and awakening of recognizing gaslighting into an energetic production that turns vulnerability into empowerment.","artist_info":"Mag is an independent artist whose music tackles contemporary emotional and psychological themes through modern production. Their direct, confrontational style reflects a generation that names toxic behavior openly and turns those experiences into art.","artist_history":"Mag represents the wave of in
