<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE ORACLE // a track will find you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06060e; --cyan:#00f0ff; --magenta:#ff2bd6; --violet:#9d4eff;
  --text:#e7e9ff; --text-dim:#9396c0; --text-faint:#5a5d82;
  --line:rgba(0,240,255,.16); --line-soft:rgba(157,78,255,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:'Rajdhani',system-ui,sans-serif; font-weight:500;
  -webkit-font-smoothing:antialiased; overflow:hidden;
}
#bgCanvas{position:fixed;inset:0;z-index:0;display:block;pointer-events:none}
body::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.45;
  background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.16) 2px 3px);mix-blend-mode:multiply}
::selection{background:var(--magenta);color:#fff}

.stage{position:fixed;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;overflow:hidden}

/* ---------------- The Orb ---------------- */
.orb-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:34px;
  transition:transform 1.1s cubic-bezier(.5,0,.1,1),opacity .9s ease;z-index:5}
.orb-wrap.revealed{transform:translateY(-2vh) scale(.62);opacity:.0;pointer-events:none}
.orb{
  width:200px;height:200px;border-radius:50%;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;border:none;background:none;
  transition:transform .4s cubic-bezier(.3,1.4,.5,1);
}
.orb:active{transform:scale(.94)}
.orb .core{
  position:absolute;inset:0;border-radius:50%;
  background:radial-gradient(circle at 50% 45%,rgba(0,240,255,.9),rgba(157,78,255,.55) 45%,rgba(255,43,214,.25) 70%,transparent 78%);
  box-shadow:0 0 60px rgba(0,240,255,.5),0 0 120px rgba(157,78,255,.35),inset 0 0 50px rgba(255,43,214,.3);
}
.orb .ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(0,240,255,.5);
  box-shadow:0 0 20px rgba(0,240,255,.4)}
.orb .ring.r2{border-color:rgba(255,43,214,.35);inset:-16px}
.orb .ring.r3{border-color:rgba(157,78,255,.25);inset:-34px}
.orb .glyph{position:relative;z-index:2;width:26px;height:26px;border-radius:50%;
  background:#fff;box-shadow:0 0 24px #fff,0 0 50px var(--cyan)}
.orb-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;letter-spacing:.02em;
  color:var(--text-dim);transition:opacity .6s;text-align:center}
.orb-wrap.charging .orb-hint{opacity:0}
.subhint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;letter-spacing:.02em;
  color:var(--text-faint);opacity:.65}
.poolcount{margin-top:18px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--text-faint);opacity:.4}

/* shockwave burst on press */
.shock{position:fixed;left:50%;top:50%;width:10px;height:10px;border-radius:50%;
  transform:translate(-50%,-50%);z-index:4;pointer-events:none;
  border:2px solid var(--cyan);opacity:0}
.shock.go{animation:shock 1.1s cubic-bezier(.2,.7,.2,1) forwards}
@keyframes shock{0%{opacity:.9;width:10px;height:10px;border-width:3px}
  100%{opacity:0;width:160vmax;height:160vmax;border-width:0.5px}}

/* ---------------- Reveal ---------------- */
.reveal{position:fixed;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;
  padding:5vh 6vw;pointer-events:none;opacity:0;transition:opacity .6s ease}
.reveal.show{opacity:1;pointer-events:auto}
.card{width:min(680px,100%);max-height:90vh;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  scrollbar-width:thin;scrollbar-color:rgba(0,240,255,.3) transparent}
.card::-webkit-scrollbar{width:6px}
.card::-webkit-scrollbar-thumb{background:rgba(0,240,255,.3);border-radius:3px}

/* each burst-in layer */
.layer{opacity:0;transform:translateY(28px) scale(.96);filter:blur(8px)}
.reveal.show .layer{animation:burst .9s cubic-bezier(.2,.8,.2,1) forwards}
.reveal.show .layer.l1{animation-delay:.05s}
.reveal.show .layer.l2{animation-delay:.16s}
.reveal.show .layer.l3{animation-delay:.28s}
.reveal.show .layer.l4{animation-delay:.42s}
.reveal.show .layer.l5{animation-delay:.56s}
.reveal.show .layer.l6{animation-delay:.72s}
@keyframes burst{to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}

.r-eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;letter-spacing:.01em;
  color:var(--magenta);text-shadow:0 0 14px rgba(255,43,214,.5);margin-bottom:16px}
.r-sleeve{width:150px;height:150px;border-radius:50%;object-fit:cover;margin:0 auto 22px;
  box-shadow:0 0 50px rgba(0,240,255,.4),0 0 90px rgba(157,78,255,.25);
  border:1px solid rgba(0,240,255,.4);animation:spin 26s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.r-title{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(26px,5.4vw,46px);
  line-height:1.02;letter-spacing:.01em;text-transform:uppercase;color:var(--text);
  text-shadow:0 0 22px rgba(0,240,255,.3),0 0 50px rgba(157,78,255,.2)}
.r-artist{font-size:clamp(18px,3vw,24px);font-weight:600;color:var(--cyan);margin-top:10px;
  text-shadow:0 0 14px rgba(0,240,255,.5)}
.r-sub{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text-dim);
  margin-top:8px;letter-spacing:.01em}

/* viz + controls */
.r-player{width:100%;max-width:560px;margin:24px auto 0}
.viz-wrap{position:relative;height:120px;border:1px solid var(--line);border-radius:4px;
  background:rgba(6,6,16,.5);overflow:hidden}
.viz-wrap canvas{display:block;width:100%;height:100%}
.r-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:18px;flex-wrap:wrap}
.play-btn{width:54px;height:54px;border-radius:50%;border:1px solid var(--cyan);background:var(--cyan);
  color:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:all .18s;box-shadow:0 0 20px rgba(0,240,255,.5)}
.play-btn:hover{box-shadow:0 0 32px rgba(0,240,255,.85)}
.play-btn.playing{background:var(--magenta);border-color:var(--magenta);color:#fff;box-shadow:0 0 26px rgba(255,43,214,.65)}
.ptime{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--text-faint);
  margin-top:12px;letter-spacing:.01em}
.takeoff{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;letter-spacing:.01em;
  font-weight:500;color:#fff;background:linear-gradient(135deg,var(--violet),var(--magenta));
  border:1px solid var(--magenta);padding:9px 22px;border-radius:30px;cursor:pointer;transition:all .18s;
  box-shadow:0 0 18px rgba(255,43,214,.45)}
.takeoff:hover{box-shadow:0 0 30px rgba(255,43,214,.8);transform:translateY(-2px)}
.takeoff.launching{animation:liftoff .9s cubic-bezier(.4,0,.2,1)}
@keyframes liftoff{0%{transform:translateY(0)}30%{transform:translateY(4px) scale(.96)}
  100%{transform:translateY(-14px) scale(1.04)}}
.spotify-mini{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  font-weight:700;text-decoration:none;color:#fff;background:rgba(255,43,214,.15);border:1px solid var(--magenta);
  padding:11px 16px;border-radius:3px;transition:all .18s}
.spotify-mini:hover{background:var(--magenta)}
.seek{flex:1;min-width:120px;max-width:240px;height:4px;background:rgba(157,78,255,.18);border-radius:2px;position:relative;overflow:hidden}
.seek i{position:absolute;left:0;top:0;height:100%;width:0;border-radius:2px;
  background:linear-gradient(90deg,var(--cyan),var(--magenta));box-shadow:0 0 10px rgba(0,240,255,.6)}

/* liner details, loose & airy */
.r-notes{margin-top:30px;display:flex;flex-direction:column;gap:24px;width:100%;max-width:560px}
.note h3{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:19px;letter-spacing:.01em;
  color:var(--violet);margin-bottom:8px;text-shadow:0 0 10px rgba(157,78,255,.4)}
.note p{font-size:16.5px;line-height:1.62;color:var(--text-dim)}
.r-origin{display:flex;gap:34px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.r-origin div .k{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--text-faint)}
.r-origin div .v{font-size:16px;font-weight:600;margin-top:3px;color:var(--cyan)}
.r-facts{list-style:none;display:flex;flex-direction:column;gap:11px;text-align:left;max-width:480px;margin:0 auto;counter-reset:f}
.r-facts li{font-size:14.5px;line-height:1.5;color:var(--text-dim);padding-left:26px;position:relative}
.r-facts li::before{content:counter(f,decimal-leading-zero);counter-increment:f;position:absolute;left:0;top:1px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--magenta);text-shadow:0 0 8px rgba(255,43,214,.5)}

/* again button */
.again{margin:38px auto 10px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;letter-spacing:.01em;
  color:var(--cyan);background:none;border:1px solid var(--cyan);
  padding:11px 30px;border-radius:40px;cursor:pointer;transition:all .2s;
  box-shadow:0 0 18px rgba(0,240,255,.25)}
.again:hover{background:rgba(0,240,255,.1);box-shadow:0 0 30px rgba(0,240,255,.5)}
.again .o{display:inline-block;margin-right:8px;animation:rollspin 3s linear infinite}
@keyframes rollspin{to{transform:rotate(360deg)}}

.spotify-embed{margin:22px auto 0;border-radius:12px;overflow:hidden;width:100%;max-width:560px}
.spotify-embed iframe{display:block;width:100%;border:0}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition-duration:.001s!important}
  .reveal.show .layer{opacity:1;transform:none;filter:none}
}
</style>
</head>
<body>
<canvas id="bgCanvas" aria-hidden="true"></canvas>

<div class="stage">
  <div class="orb-wrap" id="orbWrap">
    <button class="orb" id="orb" aria-label="Reveal a track">
      <span class="ring r3"></span><span class="ring r2"></span><span class="ring"></span>
      <span class="core"></span><span class="glyph"></span>
    </button>
    <div class="orb-hint" id="orbHint">reach out and touch it</div>
    <div class="subhint">something is waiting to be heard</div>
    <div class="poolcount" id="poolCount"></div>
  </div>
</div>

<div class="shock" id="shock"></div>

<div class="reveal" id="reveal">
  <div class="card" id="card"></div>
</div>

<script>
const LORE = [{"id":1,"title":"And Then There Was...","artist":"Anton","album":"Single","year":2021,"listens":476,"duration":"2:32","song_history":"\"And Then There Was...\" is an atmospheric electronic track by the independent producer Anton, crafted with layered synths and ambient textures. The song showcases a blend of chill electronic and lo-fi production sensibilities, designed to evoke introspective moods through its carefully arranged soundscape.","artist_info":"Anton is an independent electronic music producer who creates atmospheric, chill electronic tracks. Their sound blends ambient textures with modern electronic production, creating immersive soundscapes that resonate with fans of downtempo and lo-fi genres.","artist_history":"Anton emerged as part of the independent electronic music scene, building a following through streaming platforms. As an underground artist, they've cultivated a dedicated listener base through consistent releases of emotive, ambient-influenced electronic music.","cool_facts":["The track title hints at a narrative or moment of revelation, capturing a turning point in sound","Anton represents the thriving independent electronic music community that has flourished through streaming platforms","The song's 2:32 runtime demonstrates the art of concise, impactful electronic composition"],"tragedy_or_meaning":"The ellipsis in the title suggests something left unspoken — a moment of transition or realization. The track captures that liminal space between what was and what comes next, resonating with listeners who find comfort in ambient music during reflective moments.","artwork_url":"","artist_origin":"USA","track_made_in":"USA"},{"id":2,"title":"gandalf's fall ~ to...","artist":"Tanoshi","album":"Single","year":2022,"listens":455,"duration":"1:48","song_history":"This track is a lo-fi reimagining of the iconic score from The Lord of the Rings, specifically the haunting moment when Gandalf falls in Moria. Tanoshi transformed Howard Shore's sweeping orchestral composition into a gentle, lo-fi hip-hop beat that preserves the emotional weight while creating a cozy, study-friendly atmosphere.","artist_info":"Tanoshi is a lo-fi music producer who specializes in reimagining beloved video game and film soundtracks as chill, lo-fi hip-hop beats. Their catalog includes lo-fi versions of music from Pokémon, Star Wars, Nintendo Wii, Animal Crossing, and The Lord of the Rings.","artist_history":"Tanoshi has been active since around 2019, building a catalog of nostalgic lo-fi remixes that blend childhood favorites with relaxing beats. They've released albums covering entire game soundtracks like Pokémon Ruby & Sapphire and Pokémon HeartGold & SoulSilver in lo-fi form, earning them a loyal following among fans of both gaming culture and study music.","cool_facts":["Tanoshi's name comes from the Japanese word meaning 'fun' or 'enjoyable'","They've created entire lo-fi albums covering Pokémon regions, Nintendo Wii music, and Star Wars themes","The original Gandalf's Fall score by Howard Shore is one of the most emotionally powerful moments in film music history"],"tragedy_or_meaning":"The track channels the emotional devastation of Gandalf's sacrifice in the Mines of Moria — a moment that represents selfless courage and the grief of losing someone believed gone forever. Reimagined in lo-fi, it transforms cinematic sorrow into something meditative and healing, perfect for quiet reflection.","artwork_url":"","artist_origin":"USA","track_made_in":"USA"},{"id":3,"title":"La alegria","artist":"Scott Rill","album":"La alegría - Single","year":2020,"listens":266,"duration":"2:53","song_history":"\"La alegrÃ­a\" is a collaboration between Ukrainian electronic producer Scott Rill and Israeli-Spanish vocalist Yasmin Levy, blending electronic dance music with traditional Ladino (Judeo-Spanish) vocal elements. The track was released in 2020 and later received a remix by AMÃ‰ME in 2022, released through Virgin Records Germany/Astralwerks.","artist_info":"Scott Rill is a Ukrainian electronic music producer from the small town of Uzhhorod. He creates infectious dance music characterized by pulsing beats and delicate melodies, blending deep house and progressive electronic styles. His sound is all about deep vibes and emotional electronic landscapes.","artist_history":"Born in Uzhhorod, Ukraine, Scott Rill began producing music in 2018, experimenting with different sounds on his computer. He quickly gained traction online, accumulating over 100 million YouTube views and surpassing 1.8 million monthly Spotify listeners. His breakout tracks include 'La alegría,' 'Before I Die,' and 'Bloodstream.'","cool_facts":["Scott Rill has amassed over 100 million YouTube views since starting production in 2018","The song features Yasmin Levy, an internationally acclaimed vocalist who sings in Ladino, the ancient language of Sephardic Jews","The title 'La alegría' means 'The Joy' in Spanish, and the track bridges Ukrainian electronic production with Mediterranean vocal traditions"],"tragedy_or_meaning":"\"La alegrÃ­a\" celebrates joy and cultural connection, merging Eastern European electronic production with the ancient Ladino singing tradition. The song represents how music transcends borders and languages — a young Ukrainian producer and a celebrated Israeli-Spanish vocalist finding harmony together through their shared love of beautiful sound.","artwork_url":"","artist_origin":"Uzhhorod, Ukraine","track_made_in":"Uzhhorod, Ukraine"},{"id":4,"title":"Tijuana","artist":"Elijah","album":"Single","year":2022,"listens":220,"duration":"2:50","song_history":"\"Tijuana\" is a track by the independent artist Elijah, evoking the energy and warmth of the Mexican border city through its production. The song combines hip-hop and R&B influences with atmospheric elements that capture a sense of freedom and adventure.","artist_info":"Elijah is an independent music artist who blends hip-hop, R&B, and atmospheric production styles. Their music features smooth vocals layered over modern beats, creating tracks that feel both intimate and expansive. They represent the new wave of independent artists finding audiences through streaming platforms.","artist_history":"Elijah has been building a catalog of releases as an independent artist, gaining listeners through streaming platforms and word of mouth. As part of the growing independent music community, they've cultivated a dedicated fanbase that appreciates their genre-blending approach to modern music.","cool_facts":["The song title references Tijuana, Mexico — a city known for its vibrant culture, music scene, and border-town energy","Elijah represents the independent artist movement where creators can reach audiences without traditional label backing","The track's 2:50 runtime delivers a concise musical journey that captures a specific mood and place"],"tragedy_or_meaning":"\"Tijuana\" evokes the spirit of a city that represents both freedom and longing — a place where cultures collide and new stories begin. The track channels that sense of being on the edge of something, where every sunset feels like a new beginning and the music carries you somewhere you've never been.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/58/Post_Malone_-_Hollywood%27s_Bleeding.png","artist_origin":"London, England, UK","track_made_in":"London, England, UK"},{"id":5,"title":"Wrecked","artist":"Imagine Dragons","album":"Mercury - Act 1","year":2021,"listens":209,"duration":"4:04","song_history":"\"Wrecked\" was written by lead vocalist Dan Reynolds shortly after losing his sister-in-law, Alisha Durtschi Reynolds, to cancer. Reynolds was with her and his brother when she passed, and described it as the first time he had witnessed death in that way. The song became his way of processing that grief, using music as his refuge during an incredibly difficult time.","artist_info":"Imagine Dragons is an American pop rock band from Las Vegas, Nevada, formed in 2008. The band currently consists of lead singer Dan Reynolds, guitarist Wayne Sermon, and bassist Ben McKee. Their sound blends arena rock energy with catchy pop choruses and electronic elements.","artist_history":"Rising from the Nevada desert in the late 2000s, Imagine Dragons quickly became one of the most popular American bands of the 2010s. Their debut album 'Night Visions' (2012) produced the massive hit 'Radioactive,' and they've since sold over 74 million albums worldwide, dominating radio airplay with hits like 'Believer,' 'Thunder,' and 'Demons.'","cool_facts":["Dan Reynolds described his sister-in-law as 'the brightest light, a beacon of joy and strength for everyone she met'","The song debuted as the lead single from Mercury - Act 1, marking a more personal and vulnerable direction for the band","Reynolds said he hopes she 'hears it somewhere in a place where she is healed and no longer in pain'"],"tragedy_or_meaning":"\"Wrecked\" is one of Imagine Dragons' most emotionally raw songs, born from the devastating loss of Dan Reynolds' sister-in-law to cancer. Reynolds wrote it as his way of dealing with grief, calling music his refuge. The song is his wish for an eternity with those he loves — a testament to how loss can seal into our minds both the fragility and preciousness of life.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/f/f6/Wrecked_song_cover.jpg","artist_origin":"Las Vegas, Nevada, USA","track_made_in":"Los Angeles, California, USA"},{"id":6,"title":"Grave Bell","artist":"Diggz","album":"Grave Bell - Single","year":2024,"listens":206,"duration":"2:38","song_history":"\"Grave Bell\" was released in August 2024 by Diggy Graves (credited here as Diggz), an artist known for creating music that blends rap with theatrical, high-energy production. The track showcases his signature style of combining intense vocal delivery with cinematic instrumental arrangements.","artist_info":"Diggy Graves is an American rapper and creative artist raised in the Pacific Northwest who describes his music as a melting pot of genres. He created his masked persona in 2020 and is known for his theatrical approach to music, combining rap with dramatic, cinematic production styles.","artist_history":"Diggy Graves has been making music for most of his life but launched his current persona behind the mask in 2020. He's built a strong following through tracks like 'Red Vineyard' and 'Circus Psycho,' establishing himself as a unique voice in the independent rap scene with his genre-bending approach to hip-hop.","cool_facts":["Diggy Graves performs behind a mask, adding a theatrical element to his artistic identity","He describes his music as a 'melting pot of genres' ranging from Rap to cinematic storytelling","The track was released in 2024, showing Diggy's continued creative evolution"],"tragedy_or_meaning":"\"Grave Bell\" carries dark, atmospheric energy that speaks to resilience and facing one's shadows. The imagery of a grave bell — historically used to signal that someone buried alive could ring for rescue — symbolizes the fight to be heard and the refusal to be silenced, making it an anthem for those who refuse to give up.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/8/80/Eminem_-_Kamikaze.jpg","artist_origin":"Tacoma, Washington, USA","track_made_in":"Tacoma, Washington, USA"},{"id":7,"title":"Hollywood's Bleeding","artist":"Post Malone","album":"Hollywood's Bleeding","year":2019,"listens":205,"duration":"2:36","song_history":"\"Hollywood's Bleeding\" is the title track from Post Malone's third studio album, released on September 6, 2019. The song presents Hollywood as a place that slowly drains the life from people, using haunting melodies to explore the allure and toxicity of fame. It was crafted during sessions that defined Malone's most ambitious album to date.","artist_info":"Post Malone (born Austin Richard Post, July 4, 1995) is an American singer, rapper, songwriter, and record producer from Syracuse, New York, raised in Grapevine, Texas. His music uniquely blends pop, hip-hop, trap, country, R&B, and rock, creating a genre-defying sound that has made him one of the biggest artists of his generation.","artist_history":"Post Malone first gained recognition in 2015 with his debut single 'White Iverson,' which led to a deal with Republic Records. His career has been a meteoric rise — from 'Stoney' (2016) to 'Hollywood's Bleeding' (2019) to his country pivot with 'F-1 Trillion' (2024), he's collaborated with everyone from Swae Lee to Morgan Wallen, earning multiple diamond-certified singles.","cool_facts":["Hollywood's Bleeding debuted at #1 on the Billboard 200 and features collaborations with Ozzy Osbourne, Travis Scott, and SZA","The album produced Post Malone's first #1 single 'Circles' and the Spider-Verse hit 'Sunflower'","Post Malone learned to play guitar at age 9 after being inspired by Guitar Hero and went on to teach himself multiple instruments"],"tragedy_or_meaning":"The song paints Hollywood as a beautiful but wounded place — 'bleeding' beneath its glamorous surface. Malone reflects on how people are drawn to fame despite its toxicity, unable to let go even when they know it's destroying them. It speaks to anyone who has felt trapped in a situation they know isn't good for them but can't bring themselves to leave.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/58/Post_Malone_-_Hollywood%27s_Bleeding.png","artist_origin":"Grapevine, Texas, USA","track_made_in":"Los Angeles, California, USA"},{"id":8,"title":"Stoned (OTR Remix)","artist":"Blonda","album":"Stoned (OTR Remix) - Single","year":2017,"listens":201,"duration":"3:02","song_history":"\"Stoned (OTR Remix)\" takes the Copenhagen duo Blondage's piercing pop hymn and transforms it through Atlanta beatmaker OTR's percussive yet atmospheric lens. The remix keeps the original's infectious chorus intact while adding more experimental synths, creating a danceable yet dreamy electronic track that bridges Scandinavian pop with American electronic production.","artist_info":"Blondage (credited here as Blonda) is a Copenhagen-based electronic pop duo formed by Esben NÃ¸rskov Andersen and Pernille Smith-Sivertsen. Their sound appeals to fans of Flume, MÃ˜, and Nao — combining electronic production with infectious pop melodies and bold vocal performances.","artist_history":"Blondage emerged from Copenhagen's vibrant electronic pop scene, quickly establishing themselves with singles like 'Stoned,' 'Boss,' and 'Call It Off.' They've collaborated with other artists and built a reputation for creating music that bridges indie electronic and accessible pop, with OTR being one of several producers to remix their work.","cool_facts":["OTR is an Atlanta-based electronic artist known for his remixes of Sunset Lover, Dinosaur, and other tracks","Blondage writes and records in Copenhagen, one of Scandinavia's most vibrant music cities","The original 'Stoned' was described as a 'piercing pop hymn' that gained international attention before the remix"],"tragedy_or_meaning":"\"Stoned\" explores the intoxicating feeling of being completely absorbed in a moment or a person — that euphoric state where everything else fades away. The OTR remix amplifies this feeling with its atmospheric production, creating a sonic experience that mirrors the sensation of losing yourself in something beautiful.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/d/d6/Future_cover.jpg","artist_origin":"Copenhagen, Denmark","track_made_in":"Copenhagen, Denmark"},{"id":9,"title":"Waiting For Never","artist":"Post Malone","album":"Twelve Carat Toothache (Deluxe)","year":2022,"listens":196,"duration":"3:17","song_history":"\"Waiting For Never\" was released as a bonus track on the deluxe edition of Post Malone's fourth album 'Twelve Carat Toothache' in June 2022. The album was largely written during laidback sessions enhanced by the fresh salt air, where Malone rediscovered his creative spark after a period of creative struggle. Rolling Stone described the track as filled with 'plenty of pop tenderness.'","artist_info":"Post Malone (born Austin Richard Post, July 4, 1995) is an American singer, rapper, songwriter, and record producer. His music blends pop, hip-hop, trap, country, R&B, and rock into a distinctive, genre-defying sound that has made him one of the most streamed artists in the world.","artist_history":"From his 2015 breakthrough with 'White Iverson' to becoming one of music's biggest stars, Post Malone has consistently evolved. Each album — Stoney (2016), beerbongs & bentleys (2018), Hollywood's Bleeding (2019), Twelve Carat Toothache (2022), Austin (2023), and F-1 Trillion (2024) — showcases his genre-fluid artistry and emotional depth.","cool_facts":["Twelve Carat Toothache was mostly written during free-form creative sessions by the ocean","Post Malone told Billboard there was 'a switch that flipped' that helped him rediscover his creative spark for this album","The deluxe edition added 'Waiting For Never' and 'Hateful' as bonus tracks to the original 14-track album"],"tragedy_or_meaning":"\"Waiting For Never\" captures the tender vulnerability that defines much of Twelve Carat Toothache — an album Post Malone described as wanting to show 'people are not alone in their times of loneliness and worry.' The song embodies the bittersweet feeling of waiting for something you know may never arrive, yet finding beauty in the hoping itself.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/59/Metro_Boomin_-_Heroes_%26_Villains.png","artist_origin":"Grapevine, Texas, USA","track_made_in":"Los Angeles, California, USA"},{"id":10,"title":"Mask Off","artist":"Future","album":"FUTURE","year":2017,"listens":194,"duration":"3:25","song_history":"\"Mask Off\" was produced by Metro Boomin and features one of hip-hop's most iconic samples — a flute melody from 'Prison Song' by Carlton Simon, taken from the 1976 musical 'Selma' about Dr. Martin Luther King Jr. The haunting flute loop became a cultural phenomenon, spawning the viral #MaskOffChallenge where musicians performed their own renditions of the melody.","artist_info":"Future (born Nayvadius DeMun Wilburn, November 20, 1983) is an American rapper, singer, songwriter, and record producer from Atlanta, Georgia. He is credited with pioneering the use of Auto-Tuned melodies in hip-hop and trap music, and is known for his prolific output and distinctive vocal style.","artist_history":"Born and raised in Atlanta, Future signed with Epic Records in 2011 and released his debut album 'Pluto' in 2012. He made history by releasing two consecutive #1 albums in the same month (FUTURE and HNDRXX in 2017). His partnership with Metro Boomin has produced some of trap music's most influential work, earning GRAMMY wins and cementing his legacy.","cool_facts":["The famous flute sample comes from a 1976 musical about Dr. Martin Luther King Jr.'s civil rights activism","The #MaskOffChallenge went viral with classical musicians, marching bands, and instrumentalists performing the flute melody","During COVID-19, Future launched a 'Mask On' campaign through his FreeWishes Foundation, providing over 100,000 masks to medical workers"],"tragedy_or_meaning":"\"Mask Off\" resonates as a declaration of authenticity — removing the facades people wear to survive. The song's hypnotic flute melody, sampled from a civil rights musical, adds layers of cultural significance. It became an anthem for being unapologetically yourself, with the flute creating an almost meditative quality that listeners find both energizing and introspective.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/5c/Tove_Lo_-_Lady_Wood.png","artist_origin":"Atlanta, Georgia, USA","track_made_in":"Atlanta, Georgia, USA"},{"id":11,"title":"Float","artist":"Calliope","album":"Single","year":2022,"listens":182,"duration":"2:49","song_history":"\"Float\" is an ethereal track by the independent artist Calliope, crafted with lush electronic production and dreamy atmospherics. The song captures a weightless, transcendent quality through its layered synths and gentle rhythms, creating a sonic experience that lives up to its title.","artist_info":"Calliope is an independent electronic/indie music artist who creates atmospheric, dreamlike tracks. Named after the Greek muse of eloquence and epic poetry — 'the beautiful-voiced' — the artist crafts music that blends electronic production with ethereal vocal elements and ambient textures.","artist_history":"Calliope has been building a presence in the independent music scene, releasing tracks through streaming platforms that resonate with fans of ambient electronic and indie music. As part of the growing community of independent artists, they've carved out a space for contemplative, beautiful music.","cool_facts":["Calliope is named after the Greek muse who presides over eloquence and epic poetry, called 'Chief of all Muses' by Hesiod","The track title 'Float' perfectly encapsulates the weightless, dreamy quality of the production","The song represents the thriving underground electronic music scene where artists create atmospheric soundscapes"],"tragedy_or_meaning":"\"Float\" captures the rare and beautiful sensation of weightlessness — those moments when you feel untethered from worry and free to simply exist. It's music for the in-between moments, when you need to let go of gravity and trust that you'll be carried. The track offers listeners a sonic escape, a place to drift and find peace.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/d/df/RedHotChiliPeppersCalifornication.jpg","artist_origin":"USA","track_made_in":"USA"},{"id":12,"title":"Losers (feat. Jelly Roll)","artist":"Post Malone","album":"F-1 Trillion","year":2024,"listens":170,"duration":"3:29","song_history":"\"Losers\" was produced by Louis Bell and Charlie Handsome for Post Malone's sixth studio album F-1 Trillion, his country music debut released August 16, 2024. The song is an underdog anthem that celebrates resilience and community, featuring Jelly Roll's powerful vocals alongside Post Malone's genre-fluid delivery.","artist_info":"Post Malone is an American singer, rapper, songwriter, and record producer whose music blends pop, hip-hop, trap, country, R&B, and rock. On F-1 Trillion, he embraces country music wholeheartedly, collaborating with legends like Dolly Parton, Tim McGraw, and Blake Shelton alongside Jelly Roll.","artist_history":"Post Malone's career arc from 'White Iverson' (2015) to F-1 Trillion (2024) showcases one of music's most remarkable genre evolutions. His country album features Morgan Wallen, Luke Combs, Chris Stapleton, and many more — proving his ability to authentically move between musical worlds while maintaining his distinctive voice.","cool_facts":["F-1 Trillion's lead single 'I Had Some Help' with Morgan Wallen became a massive #1 hit","The song was performed live at T-Mobile Park in Seattle with the whole stadium singing along","While the album title might suggest wealth, 'Losers' explores resilience, individuality, and the need for community"],"tragedy_or_meaning":"\"Losers\" is an anthem for the underdogs — anyone who has ever felt like they don't fit in or belong. Post Malone and Jelly Roll celebrate the beauty of being different, finding your people, and knowing that 'there's a place you can always get in.' It's about turning the label of 'loser' into a badge of honor and finding strength in community.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/c/ce/Phil_Collins_-_Face_Value.png","artist_origin":"Grapevine, Texas, USA","track_made_in":"Nashville, Tennessee, USA"},{"id":13,"title":"Wolves (feat. Post Malone)","artist":"Big Sean","album":"Detroit 2","year":2020,"listens":169,"duration":"3:20","song_history":"\"Wolves\" was released as the second single from Big Sean's fifth studio album Detroit 2 in September 2020. The dark, atmospheric track features Post Malone and was directed as a music video by Kid. Studio, with Big Sean celebrating his Detroit roots while real wolves ran around the set. Big Sean's mother, Myra Anderson, makes a cameo in the video.","artist_info":"Big Sean (born Sean Michael Leonard Anderson, March 25, 1988) is an American rapper from Detroit, Michigan. He met Kanye West as a teenager and signed with his record label GOOD Music in 2007, going on to become one of hip-hop's most consistent hitmakers with a style that blends introspective lyrics with confident delivery.","artist_history":"Raised in Detroit by his mother and grandmother, Big Sean attended Cass Technical High School where he furthered his music career. He gained attention through local radio station 102.7FM, independently selling copies of his music before Kanye West signed him. He's released multiple platinum albums including Finally Famous, Dark Sky Paradise, and Detroit 2.","cool_facts":["Big Sean rapped for Kanye West when he was just a teenager, earning his GOOD Music deal on the spot","Detroit 2 is a sequel to his 2012 mixtape, coming full circle in his career","The song peaked at #65 on the Billboard Hot 100 and its dark music video features real wolves on set"],"tragedy_or_meaning":"\"Wolves\" is about loyalty, survival, and knowing who your pack is. The wolf imagery represents both the predatory nature of the world and the fierce loyalty of those who stick together. Big Sean uses it to honor those who raised him and the community that shaped him, reminding listeners that going against the pack means 'risking your life.'","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/58/Post_Malone_-_Hollywood%27s_Bleeding.png","artist_origin":"Detroit, Michigan, USA","track_made_in":"Los Angeles, California, USA"},{"id":14,"title":"Cool Girl","artist":"Tove Lo","album":"Lady Wood","year":2016,"listens":167,"duration":"3:19","song_history":"Tove Lo wrote \"Cool Girl\" on a day off during her Queen of the Clouds Tour in Copenhagen, Denmark. She received a bass line from producers Jakob Jerlström and Ludvig Söderberg (The Struts) at her hotel, set up her bedroom studio, and wrote the melody, chorus, and pre-chorus inspired by the 'Cool Girl' monologue from the 2014 film Gone Girl.","artist_info":"Tove Lo (born Ebba Tove Elsa Nilsson, October 29, 1987) is a Swedish singer-songwriter known for her raw, grunge-influenced pop music and deeply autobiographical lyrics. Her nickname 'Lo' comes from the Swedish word for lynx — a favorite animal at her local zoo. She's been called 'the saddest girl in Sweden.'","artist_history":"Growing up in Djursholm, Sweden, Tove Lo attended the music school Rytmus Musikergymnasiet and formed the rock band Tremblebee in 2006. After it disbanded, she earned a publishing deal with Warner/Chappell Music in 2011. Her breakthrough single 'Habits (Stay High)' launched her international career, followed by albums Queen of the Clouds, Lady Wood, and beyond.","cool_facts":["The song was directly inspired by Rosamund Pike's 'Cool Girl' monologue in the film Gone Girl","Tove Lo's stage name comes from 'lo,' the Swedish word for lynx — her favorite zoo animal as a child","'Cool Girl' is a downtempo electropop song with elements of techno and house music"],"tragedy_or_meaning":"\"Cool Girl\" explores the exhausting game of pretending to be effortlessly unbothered in relationships — playing a role because you're afraid to be vulnerable. Inspired by Gone Girl, it captures the sarcasm and pain of molding yourself into someone you're not to keep someone's interest. It resonates with anyone who has ever hidden their true feelings behind a facade of indifference.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/d/d3/Jfrontiers.jpg","artist_origin":"Stockholm, Sweden","track_made_in":"Copenhagen, Denmark"},{"id":15,"title":"Over Now","artist":"Post Malone","album":"Twelve Carat Toothache (Deluxe)","year":2022,"listens":165,"duration":"4:07","song_history":"\"Over Now\" is a track from the deluxe edition of Post Malone's fourth album 'Twelve Carat Toothache,' an album he described as wanting to uplift and show that 'people are not alone in their times of loneliness and worry.' The album was written during creative sessions by the ocean where Malone pushed past a period of artistic struggle to create his most personal work.","artist_info":"Post Malone is an American singer, rapper, songwriter, and record producer whose genre-defying sound blends pop, hip-hop, trap, country, R&B, and rock. Born in Syracuse, New York and raised in Grapevine, Texas, he's become one of the most-streamed artists of his generation.","artist_history":"Post Malone's father worked for the Dallas Cowboys, and young Austin grew up around music, learning guitar at 9 after being inspired by Guitar Hero. He made his first mixtape at 16 using Audacity, and by 2015, 'White Iverson' changed everything. He's since earned multiple #1 albums and diamond-certified singles across multiple genres.","cool_facts":["Post Malone learned guitar at age 9 after being inspired by the video game Guitar Hero","Twelve Carat Toothache features an unlikely collaboration with indie folk band Fleet Foxes","The album was Post Malone's most personal project, exploring fame, relationships, and self-reflection"],"tragedy_or_meaning":"\"Over Now\" captures the finality of endings — whether relationships, chapters of life, or versions of yourself that no longer serve you. Within the context of Twelve Carat Toothache, it reflects Post Malone's reckoning with fame and his desire to be authentic rather than just commercially successful. It's about accepting when something has run its course and finding the courage to move forward.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/8/84/Ellie_Goulding_-_Halcyon.png","artist_origin":"Grapevine, Texas, USA","track_made_in":"Los Angeles, California, USA"},{"id":16,"title":"Till It's Gone","artist":"Yelawolf","album":"Love Story","year":2015,"listens":164,"duration":"4:36","song_history":"\"Till It's Gone\" was originally known as 'The Swampy Record' due to its dark and atmospheric tone. On September 16, 2014, it was featured on the second episode of the seventh season of Sons of Anarchy, which Yelawolf described as a 'perfect fit.' The song was later included on his 2015 album Love Story.","artist_info":"Yelawolf (born Michael Wayne Atha, December 30, 1979) is an American rapper born in Gadsden, Alabama, and raised in Antioch, Tennessee. He constructed his stage name from 'Yela' (which he says is Cherokee for 'sun') and 'wolf,' combining Native American heritage with fierce independence in his musical identity.","artist_history":"Yelawolf began his recording career independently in 2005, releasing mixtapes to positive local reception. It wasn't until 2010's Trunk Muzik EP that he gained mainstream attention, leading to a deal with Eminem's Shady Records. His album Love Story (2015) showcased his ability to blend hip-hop with Southern rock and country influences.","cool_facts":["The song was featured in Sons of Anarchy Season 7, perfectly matching the show's dark, outlaw tone","Yelawolf's name combines 'Yela' (Cherokee for 'sun') with 'wolf' — reflecting his heritage","He was signed to Eminem's Shady Records, joining one of hip-hop's most prestigious rosters"],"tragedy_or_meaning":"\"Till It's Gone\" is an anthem of self-respect and personal boundaries — a declaration that you won't be taken advantage of or treated as disposable. The song speaks to anyone who has reached their breaking point and decided to stand up for themselves. Its placement in Sons of Anarchy amplified its message about facing consequences and choosing your own path, no matter how difficult.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/d/df/G-Eazy_These_Things_Happen.jpg","artist_origin":"Gadsden, Alabama, USA","track_made_in":"Nashville, Tennessee, USA"},{"id":17,"title":"Goodbyes (feat. Young Thug)","artist":"Post Malone","album":"Hollywood's Bleeding","year":2019,"listens":159,"duration":"2:55","song_history":"\"Goodbyes\" was produced by frequent collaborator Louis Bell and Brian Lee (known for work with Camila Cabello and Justin Bieber). Released in July 2019, it debuted at #1 on the Rolling Stone Top 100 chart and marked Post Malone's first official collaboration with Atlanta's Young Thug. The cinematic music video, directed by Colin Tilley, is set in the 1950s.","artist_info":"Post Malone is an American singer, rapper, songwriter, and record producer whose genre-blending approach has produced multiple diamond-certified hits. His collaboration with Young Thug on this track brought together two of modern music's most distinctive vocalists.","artist_history":"By 2019, Post Malone had established himself as one of music's biggest stars. Hollywood's Bleeding became his second #1 album and earned a Grammy nomination for Album of the Year. The album's star-studded features — from Ozzy Osbourne to SZA — showcased his ability to collaborate across every genre.","cool_facts":["The song debuted at #1 on the Rolling Stone Top 100 chart upon release","The promotional poster featured the phrase 'Too much pleasure is pain'","The 1950s-themed music video, directed by Colin Tilley, features Post Malone coming back from beyond"],"tragedy_or_meaning":"\"Goodbyes\" is about the painful end of a toxic relationship — wanting someone out of your head and your life but being terrible at letting go. Post Malone sings 'I need to be saved too,' acknowledging that both people in a failing relationship are struggling. It captures the universal difficulty of walking away from something that once meant everything.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/1/10/Beerbongs_%26_Bentleys_by_Post_Malone.png","artist_origin":"Grapevine, Texas, USA","track_made_in":"Los Angeles, California, USA"},{"id":18,"title":"Fall In Love (Until...)","artist":"Phantoms","album":"Voices","year":2014,"listens":159,"duration":"4:14","song_history":"\"Fall In Love\" was released as the lead single from Phantogram's second studio album 'Voices' in December 2013. The track features a huge driving electronic hook that provides a counterpoint to the quieter, more vulnerable vocal elements. Phantogram writes and records in a remote barn in upstate New York called Harmony Lodge, giving their music a unique intimate-yet-expansive quality.","artist_info":"Phantogram (credited here as Phantoms) is an American electronic rock duo from Greenwich, New York, formed in 2007 by lifelong friends Sarah Barthel (vocals, keyboards) and Josh Carter (vocals, guitars). Their music merges electronic beats, rock dynamics, and pop sensibilities with hip-hop-inspired rhythms.","artist_history":"Sarah Barthel and Josh Carter met in middle school and became lifelong friends, though they didn't start making music together until their twenties. They formed Phantogram in 2007, recording in a remote barn called Harmony Lodge. Since their 2010 debut 'Eyelid Movies,' they've released five studio albums and earned RIAA Platinum certification for 'Fall In Love.'","cool_facts":["'Fall In Love' earned RIAA Platinum certification in November 2025","Phantogram records in a remote barn called 'Harmony Lodge' in upstate New York","NPR praised the song's 'huge driving sound' that helps it 'accelerate and crank along'"],"tragedy_or_meaning":"\"Fall In Love\" explores the vulnerability and fear that comes with opening your heart — the terrifying leap of letting someone in when you've been hurt before. The lyric 'Could it be that I fell apart?' captures the anxiety of love's uncertainty. Phantogram's signature electronic intensity mirrors the overwhelming rush of emotions that come with falling for someone against your better judgment.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/f/f7/Big_Sean_-_Detroit_2.gif","artist_origin":"Greenwich, New York, USA","track_made_in":"Saratoga Springs, New York, USA"},{"id":19,"title":"Lace It (with Eminem)","artist":"Juice WRLD","album":"The Party Never Ends","year":2023,"listens":156,"duration":"3:38","song_history":"\"Lace It\" was released in December 2023 as the lead single from Juice WRLD's posthumous album 'The Party Never Ends.' Produced by Benny Blanco, Happy Perez, and Cashmere Cat with additional production from Eminem, the track brought together two artists who shared mutual admiration — Juice WRLD's mother confirmed that Jarad played Eminem's music on repeat at home because he was a huge fan.","artist_info":"Juice WRLD (born Jarad Anthony Higgins, December 2, 1998) was an American rapper, singer, and songwriter from Chicago, Illinois, known for his freestyling ability and deeply introspective lyrics. He was a key figure in the emo rap and SoundCloud rap movements, blending rock and hip-hop influences.","artist_history":"Juice WRLD began his career in 2015 as JuicetheKidd, inspired by 2Pac's character in the film 'Juice.' His breakthrough came with the diamond-certified 'Lucid Dreams' in 2018, and he quickly became one of his generation's most beloved artists. He passed away on December 8, 2019, at just 21 years old. His legacy continues through posthumous releases.","cool_facts":["Juice WRLD's mother said Jarad 'played Eminem's music on repeat at home because he was a huge fan'","The song has surpassed 120 million streams on Spotify","Eminem's verse pays tribute to artists lost too soon, including Juice WRLD himself — making the track deeply personal for both artists"],"tragedy_or_meaning":"\"Lace It\" is a profoundly emotional collaboration between two generations of artists reflecting on personal struggles and loss. Eminem's verse honors those who left too soon, including Juice WRLD himself, saying 'synthetic heroin, you tried to kill me, then you murdered Jarad, didn't you?' Juice WRLD's mother called it 'a bittersweet moment' — happy that her son made music with someone he admired, yet heartbroken he can't be here to experience it.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/8/8b/Roddy_Ricch_-_Please_Excuse_Me_for_Being_Antisocial.png","artist_origin":"Chicago, Illinois, USA","track_made_in":"Los Angeles, California, USA"},{"id":20,"title":"You and Me","artist":"Yves","album":"Single","year":2022,"listens":150,"duration":"4:02","song_history":"\"You and Me\" is a melodic track by the artist Yves, featuring warm production and intimate vocal delivery. The song captures the essence of connection and togetherness through its gentle arrangements and heartfelt lyricism, creating a personal and emotionally resonant listening experience.","artist_info":"Yves is a music artist who creates melodic, emotionally-driven tracks that blend pop sensibilities with electronic and R&B influences. Their music focuses on themes of love, connection, and personal experience, delivered through smooth vocal performances over carefully crafted production.","artist_history":"Yves has been building a presence in the music world through streaming platforms, cultivating a dedicated listener base with emotionally resonant, melodic tracks. As part of the independent music community, they represent the new generation of artists who connect directly with audiences through digital platforms.","cool_facts":["The song title 'You and Me' is one of the most universally beloved phrases in music, representing intimate connection","At 4:02, it's one of the longer tracks in this playlist, allowing the emotional journey to fully develop","Yves represents the global nature of modern music, where artists from any background can reach international listeners"],"tragedy_or_meaning":"\"You and Me\" speaks to the simple yet profound power of human connection — the idea that in a complicated world, sometimes the most important thing is just being together with someone who understands you. The song's gentle, extended runtime gives listeners space to sit with their own feelings about the people who matter most in their lives.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/d/db/CJ_-_Whoopty.png","artist_origin":"Antwerp, Belgium","track_made_in":"Antwerp, Belgium"},{"id":21,"title":"Around Me","artist":"Metro Boomin","album":"HEROES & VILLAINS","year":2022,"listens":147,"duration":"3:12","song_history":"\"Around Me\" was released on December 2, 2022 as part of Metro Boomin's second studio album HEROES & VILLAINS. The track was co-produced by Metro Boomin and Prince 85, and written alongside Don Toliver and Simon Park. It showcases Metro's signature cinematic production style with lush, atmospheric soundscapes.","artist_info":"Metro Boomin (born Leland Tyler Wayne) is an American record producer from St. Louis, Missouri, widely acclaimed for his dark and cinematic production style. He is regarded as one of the most influential producers in contemporary hip-hop and trap music, known for his iconic producer tag 'If Young Metro don't trust you...'","artist_history":"Metro Boomin began producing at age 16 in 2009 and relocated to Atlanta to attend Morehouse College in 2012, where he connected with Future, Gucci Mane, and Young Thug. He became one of hip-hop's most in-demand producers, working with Drake, Travis Scott, 21 Savage, and Kanye West, and later scored the Spider-Man: Across the Spider-Verse soundtrack.","cool_facts":["Metro started making beats after watching a YouTube tutorial on FL Studio when he was in high school","His album HEROES & VILLAINS debuted at #1 on the Billboard 200","He won a Grammy for Best Remixed Recording for his remix of Lady Gaga's 'Abracadabra' at the 68th Grammy Awards"],"tragedy_or_meaning":"HEROES & VILLAINS explores the duality of life — the choices between good and evil, heroism and villainy. The album was deeply personal to Metro, who has spoken about the loss of his mother in 2022, making the themes of vulnerability and strength throughout the project resonate on an intensely emotional level.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/2/22/Sickology101.jpg","artist_origin":"St. Louis, Missouri, USA","track_made_in":"Atlanta, Georgia, USA"},{"id":22,"title":"Low Life (feat. The Weeknd)","artist":"Future","album":"EVOL","year":2016,"listens":145,"duration":"5:14","song_history":"\"Low Life\" was originally released on Christmas Day 2015 as a surprise gift to fans on SoundCloud, before being included on Future's fourth studio album EVOL in February 2016. It was produced by Metro Boomin and Ben Billions, with co-production by The Weeknd, creating a moody late-night atmosphere that perfectly blends both artists' sonic worlds.","artist_info":"Future (born Nayvadius DeMun Cash) is an American rapper, singer, and songwriter from Atlanta, Georgia. He is known for his pioneering use of Auto-Tune and his prolific output, blending trap production with melodic singing to create a sound that has defined much of modern hip-hop.","artist_history":"Future emerged from Atlanta's Dungeon Family collective and broke through commercially in 2012 with his debut album Pluto. He went on an unprecedented run in 2015, releasing three projects that each debuted at #1 on the Billboard 200, and has continued to be one of rap's most consistent hitmakers with multiple platinum albums.","cool_facts":["Future and The Weeknd performed 'Low Life' on Saturday Night Live in March 2016, marking Future's first-ever SNL appearance","The song was written by Future, The Weeknd, Metro Boomin, Ben Billions, and DaHeala","Future has had every one of his studio albums debut at #1 on the Billboard 200"],"tragedy_or_meaning":"\"Low Life\" captures the paradox of living lavishly while feeling spiritually empty — the intoxicating allure of excess paired with a melancholic undertone. Both Future and The Weeknd channel their signature themes of hedonism and vulnerability, making it a confessional anthem for those navigating the highs and lows of a fast-paced life.","artwork_url":"","artist_origin":"Atlanta, Georgia, USA","track_made_in":"Atlanta, Georgia, USA"},{"id":23,"title":"The Grim Weeper","artist":"Diggy Graves","album":"Single","year":2023,"listens":144,"duration":"3:06","song_history":"\"The Grim Weeper\" was released in October 2023 as a single by Diggy Graves, continuing his unique blend of horrorcore and emotional rap. The track showcases his signature style of pairing dark, horror-inspired aesthetics with deeply personal and introspective lyrics about mental health and emotional struggles.","artist_info":"Diggy Graves is an American rapper and performer from the Pacific Northwest who describes his music as a melting pot of genres ranging from rap to horrorcore. Known for his masked persona created in 2020, his lyrics explore dark themes drawing inspiration from horror movies, Stephen King literature, and personal experiences with mental health.","artist_history":"Diggy Graves has been making music for most of his life but created his signature masked persona in 2020, quickly gaining a following on TikTok and streaming platforms. His most popular songs include 'Red Vineyard,' 'Circus Psycho,' and 'Cute Girl,' which blend catchy hooks with horror-themed production and emotionally raw storytelling.","cool_facts":["Diggy Graves performs wearing a signature mask, keeping his identity partially concealed as part of his artistic persona","His music blends horrorcore with elements of trap, cloud rap, and emo-rap — a unique sonic cocktail","He built his fanbase primarily through TikTok and social media, representing the new wave of independent artists"],"tragedy_or_meaning":"\"The Grim Weeper\" plays on the concept of the Grim Reaper but reframes it as someone who weeps — suggesting that even death itself feels sorrow. The song resonates with listeners who find beauty in darkness and use artistic expression as a way to process grief, pain, and the weight of emotional struggles.","artwork_url":"","artist_origin":"Tacoma, Washington, USA","track_made_in":"Tacoma, Washington, USA"},{"id":24,"title":"Rasengan","artist":"Turbo Knight","album":"Don't Panic!","year":2018,"listens":141,"duration":"5:08","song_history":"\"Rasengan\" was released in January 2018 on Turbo Knight's album 'Don't Panic!' The track is named after the iconic spinning energy attack from the anime Naruto, channeling that intense, building power into a synthwave composition with catchy melodies and multiple transitions that keep the five-minute journey fresh and dynamic.","artist_info":"Turbo Knight is a Finnish synthwave music producer from Järvenpää who specializes in the darker, more cinematic side of outrun synthwave. With over 30 years of experience producing music with computers and synthesizers, his sound is characterized by vintage synths, drum machines, and retro-futuristic aesthetics.","artist_history":"Turbo Knight discovered his love for electronic music as a young teenager with a Commodore 64, experimenting with the SID chip sound. He progressed to an Amiga 500 and ProTracker, completing his first track around 1993-94. He rose to prominence in the synthwave scene in 2016 and has since released over 90 tracks on Bandcamp.","cool_facts":["Turbo Knight started making music on a Commodore C64 using poke commands in the early 1990s","He contributed to the 'In Search of Darkness' documentary soundtrack, a film celebrating 1980s horror","The song 'Rasengan' has been remixed multiple times by other synthwave artists, showing its enduring appeal in the community"],"tragedy_or_meaning":"\"Rasengan\" channels the anime concept of gathering inner energy and focusing it into something powerful — a metaphor for determination and self-belief. For listeners, it's an anthem of building momentum, the feeling of gathering strength before unleashing it, making it perfect for late-night drives or moments when you need to feel unstoppable.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/f/f0/You_Broke_Me_First_-_Tate_McRae.png","artist_origin":"Järvenpää, Finland","track_made_in":"Järvenpää, Finland"},{"id":25,"title":"Own Me","artist":"bülow","album":"The Contender EP","year":2019,"listens":137,"duration":"3:29","song_history":"\"Own Me\" was released on October 4, 2019 as part of bülow's 'Crystalline' album and 'The Contender' EP on Universal Music Canada/Republic Records. The song is an empowering anthem about defiant autonomy, with bülow declaring that no amount of money or power can buy ownership of her spirit or silence her voice.","artist_info":"bülow (born Megan Bülow in 1999 in Berlin, Germany) is a German-Canadian alt-pop singer and songwriter known for her moody electronica- and rock-influenced sound. Apple Music describes her as embedding 'harsh sentiments in ecstatic future-pop,' creating music that's both confrontational and danceable.","artist_history":"bülow grew up across the UK, Canada, the US, and the Netherlands before being discovered at a summer camp in 2016 at age 16. Her 2017 debut EP 'Damaged Vol. 1' earned her Apple Music Canada's 'New Artist of the Week,' and she later co-wrote Beyoncé's #1 hit 'Texas Hold 'Em,' earning two Grammy nominations including Song of the Year.","cool_facts":["bülow co-wrote Beyoncé's 'Texas Hold 'Em,' which hit #1 on the Billboard Hot 100","Her breakout single 'Not a Love Song' accumulated nearly 25 million Spotify streams while she was still 18","She completed high school at the American School of the Hague in the Netherlands"],"tragedy_or_meaning":"\"Own Me\" is a declaration of independence — a refusal to be controlled, purchased, or silenced by anyone with power or wealth. It resonates deeply with listeners who have felt pressured to conform or submit, offering a fierce reminder that self-worth isn't something that can be bought or taken.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/5a/Odesza_-_The_Last_Goodbye.png","artist_origin":"Berlin, Germany","track_made_in":"Toronto, Canada"},{"id":26,"title":"rockstar (feat. 21 Savage)","artist":"Post Malone","album":"Beerbongs & Bentleys","year":2017,"listens":136,"duration":"3:38","song_history":"\"rockstar\" was released on September 15, 2017 as the lead single from Post Malone's second album. It was created during a studio session with producers Louis Bell and Tank God, with Joey Bada$$ also present. Post cut a scratch vocal, took it back to LA, finished his part, and sent it to 21 Savage — the whole process was remarkably organic and unforced.","artist_info":"Post Malone (born Austin Richard Post) is an American singer, rapper, and songwriter known for blending hip-hop, pop, rock, and country influences into his own genre-defying sound. His melodic approach and distinctive voice have made him one of the best-selling music artists of his generation.","artist_history":"Post Malone rose to fame in 2015 with 'White Iverson' and has since released multiple chart-topping albums. His genre-fluid artistry has earned him diamond-certified singles, Billboard record-breaking achievements, and collaborations ranging from Ozzy Osbourne to Morgan Wallen, proving his remarkable versatility.","cool_facts":["\"rockstar\" spent 8 consecutive weeks at #1 on the Billboard Hot 100 and topped charts in 14 countries","Producers Tank God and Louis Bell took a 'less is more' approach — the beat has only four drum components","Joey Bada$$ was in the studio during the creation and has a writing credit on the song"],"tragedy_or_meaning":"\"rockstar\" captures the fantasy and reality of living without limits — the glamour and the emptiness that can come with it. Its massive success speaks to a generation drawn to the idea of rebellion and excess, while the song's melancholic undertone suggests that the rockstar lifestyle isn't as fulfilling as it appears from the outside.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/c/c0/Bouquet_EP_cover_art.jpg","artist_origin":"Grapevine, Texas, USA","track_made_in":"Los Angeles, California, USA"},{"id":27,"title":"Numb (feat. DeathbyRomy & PVRIS)","artist":"Kiiara","album":"lil kiiwi","year":2020,"listens":134,"duration":"3:23","song_history":"\"Numb\" was released on September 8, 2020 featuring DeathbyRomy and PVRIS, as part of Kiiara's debut album 'lil kiiwi' on Atlantic Records. The collaboration brought together three distinct female voices — Kiiara's glitchy pop, DeathbyRomy's dark alt-pop, and PVRIS's rock edge — creating a genre-blending exploration of emotional numbness.","artist_info":"Kiiara (born Kiara Saulters, May 24, 1995) is an American singer-songwriter from Wilmington, Illinois, signed to Atlantic Records. She's known for her experimental approach to pop music, blending electronic production with unconventional vocal processing and emotionally raw lyrics.","artist_history":"Kiiara first gained attention with 'Bring Me Back' in 2013 before her 2015 single 'Gold' peaked at #13 on the Billboard Hot 100, launching her into the mainstream. She later appeared on Linkin Park's 'Heavy' in 2017, which reached #2 on Hot Rock Songs, before releasing her debut album 'lil kiiwi' in 2020.","cool_facts":["Kiiara originally wrote 'Gold' on a classical guitar in 2014 before producer Felix Snow transformed it into an electro-pop hit","She featured on Linkin Park's single 'Heavy,' one of the last songs Chester Bennington recorded","She first started writing music on a classical guitar while growing up in small-town Illinois"],"tragedy_or_meaning":"\"Numb\" explores the feeling of emotional shutdown — when pain becomes so overwhelming that you simply stop feeling altogether. For many listeners, the song validates the experience of going numb as a coping mechanism, while the collaborative nature of three artists sharing this vulnerability makes it feel like a communal acknowledgment of shared struggle.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/b/be/Future_ft._The_Weeknd_-_Low_Life.png","artist_origin":"Wilmington, Illinois, USA","track_made_in":"Los Angeles, California, USA"},{"id":28,"title":"Play Pretend","artist":"Kasbo","album":"The Making of a Paracosm","year":2020,"listens":127,"duration":"4:29","song_history":"\"Play Pretend\" was one of the first songs Kasbo made for his sophomore album 'The Making of a Paracosm.' It started from a session where he and vocalist Ourchives were inspired by classic UK house beats and wanted to try their hand at something similar. The track was released as the album's lead single in July 2020 via Foreign Family Collective/Counter Records.","artist_info":"Kasbo (born Carl Garsbo, October 12, 1995) is a Swedish electronic record producer and DJ from Gothenburg. Starting his music career in 2013, he crafts emotionally rich electronic music, releasing through labels like Monstercat, Foreign Family Collective, and Counter Records (part of Ninja Tune).","artist_history":"Kasbo began releasing music independently in 2013 and quickly gained recognition in the electronic community. His debut album 'Places We Don't Know' (2018) established him as a rising star in melodic electronic music. His sophomore album 'The Making of a Paracosm' (2020) explored the concept of imaginary worlds through immersive soundscapes.","cool_facts":["A 'paracosm' is a detailed imaginary world — Kasbo's album explores the concept of creating alternate realities through music","The track features fellow Swedish artist Ourchives on vocals","Kasbo has released music through Ninja Tune's Counter Records, one of the most respected independent labels in electronic music"],"tragedy_or_meaning":"\"Play Pretend\" explores the dual-universe theme of escapism — the tension between the reality we live in and the imaginary worlds we build to cope. It speaks to anyone who has created a mental sanctuary to retreat to, asking whether playing pretend is a form of self-care or self-deception, and suggesting perhaps it can be both.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/a/a4/Euphoria_season_1_score.jpg","artist_origin":"Gothenburg, Sweden","track_made_in":"Gothenburg, Sweden"},{"id":29,"title":"Kosandra","artist":"yeanix","album":"Single","year":2022,"listens":127,"duration":"2:22","song_history":"\"Kosandra\" was released in 2022 as a collaboration between yeanix and Real girl, blending electronic production with catchy melodies. The track showcases yeanix's ability to create infectious, rhythm-driven electronic music with an emphasis on atmosphere and energy, delivered in a compact two-and-a-half-minute package.","artist_info":"yeanix is an electronic music producer known for creating upbeat, energetic tracks that blend elements of dance music and pop. His productions feature lively rhythms, addictive choruses, and catchy melodies that encourage dancing and movement, making him popular on streaming platforms.","artist_history":"yeanix has been building a catalog of electronic and dance tracks, collaborating with various vocalists including Alexandra Stan on 'Vanilla Chocolat.' His music has found audiences through streaming platforms and playlist placements, representing the new wave of independent electronic producers building careers through digital distribution.","cool_facts":["yeanix has collaborated with Alexandra Stan, the Romanian pop star known for 'Mr. Saxobeat'","The track 'Kosandra' features co-artist Real girl on vocals","His music represents the growing wave of independent electronic producers finding global audiences through streaming"],"tragedy_or_meaning":"\"Kosandra\" derives its name from the mythological figure Cassandra, who was cursed to speak the truth but never be believed. The song captures the universal feeling of not being heard or understood, wrapped in an electronic beat that transforms that frustration into something cathartic and danceable.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/6/63/Crawl_Outta_Love_Illenium.jpg","artist_origin":"Russia","track_made_in":"Russia"},{"id":30,"title":"Lost in the Fire (feat. The Weeknd)","artist":"Gesaffelstein","album":"Hyperion","year":2019,"listens":126,"duration":"3:22","song_history":"\"Lost in the Fire\" was released on January 11, 2019 as the second single from Gesaffelstein's album 'Hyperion.' Apple Music described it as 'a velvety expanse of darkwave R&B,' and Billboard noted it was 'not the beastly banger you're expecting' but rather 'a slow R&B groove with a soft undercurrent of disco.' It debuted at #27 on the Hot 100.","artist_info":"Gesaffelstein (born Mike Lévy in Lyon, France, 1985) is a French DJ, producer, and songwriter renowned for his dark, industrial techno sound. His name combines the German word 'Gesamtkunstwerk' (total artwork) with Einstein, reflecting his ambition to create music as art with scientific precision in detail.","artist_history":"Gesaffelstein started producing at 16 after first playing an analog synthesizer, releasing his debut EP in 2008. He gained mainstream recognition through collaborations with Kanye West on 'Yeezus' (2013), then produced for The Weeknd, Lana Del Rey, and A$AP Rocky. He won a Grammy for Best Remixed Recording for his remix of Lady Gaga's 'Abracadabra.'","cool_facts":["Gesaffelstein collaborated with Kanye West on 'Black Skinhead' and 'Send It Up' from the Yeezus album","He combined 'Gesamtkunstwerk' (German for 'total artwork') and 'Einstein' to create his stage name","The music video features The Weeknd performing slick choreography while Gesaffelstein lurks eerily in the background"],"tragedy_or_meaning":"\"Lost in the Fire\" is about being consumed by desire and temptation — losing yourself in the flames of passion without concern for consequences. The contrast between Gesaffelstein's dark, minimal production and The Weeknd's smooth vocals creates a tension that mirrors the push-pull of giving in to something you know might burn you.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/5/58/Post_Malone_-_Hollywood%27s_Bleeding.png","artist_origin":"Lyon, France","track_made_in":"Los Angeles, California, USA"},{"id":31,"title":"Never In The Middle","artist":"Teflon Sega","album":"Single","year":2022,"listens":126,"duration":"2:48","song_history":"\"Never In The Middle\" was released in March 2022, continuing Teflon Sega's tradition of creating atmospheric, reverb-soaked alternative R&B. The track features his signature ethereal production style, created in collaboration with NYC-based producer WAJU, crafting their distinctive brand of wavy, cosmic-influenced sound.","artist_info":"Teflon Sega is a Cleveland-based singer known for his haunting, reverb-soaked vocals and cosmic synths. Billboard described him as an 'enigmatic R&B newcomer' who creates music in a 'purple-hued dystopian world,' blending alternative R&B with futuristic, almost otherworldly production.","artist_history":"Teflon Sega first arrived in 2016 with his haunting single 'Sinner,' quickly capturing attention from tastemakers and earning spins from BBC Radio 1Xtra. His 2016 breakout single 'Beretta Lake' achieved viral success, and he's since built a devoted fanbase through innovative online engagement, including virtual concerts and augmented-reality performances.","cool_facts":["Teflon Sega's dream is to have a fully touring holographic augmented-reality live show","He achieved viral success in 2016 with 'Beretta Lake' and interacts with fans through videos set in a purple-hued dystopian world","He frequently collaborates with NYC producer WAJU to create their unique brand of alternative R&B"],"tragedy_or_meaning":"\"Never In The Middle\" speaks to the all-or-nothing nature of deep emotion — refusing to exist in the grey area between love and indifference. For listeners, it captures the intensity of someone who feels things fully, never halfway, making it resonate with anyone who has loved deeply and completely without reservation.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/0/0a/Spiral_by_Rezz_%28cover_art%29.png","artist_origin":"Cleveland, Ohio, USA","track_made_in":"Cleveland, Ohio, USA"},{"id":32,"title":"Take What You Want (feat. Ozzy Osbourne)","artist":"Post Malone","album":"Hollywood's Bleeding","year":2019,"listens":124,"duration":"3:50","song_history":"The collaboration came together when producer Andrew Watt told Post Malone that Ozzy Osbourne wanted to work with him. Post didn't believe it until he got a FaceTime from Ozzy. Watt recorded Ozzy's vocals, laid down the guitar solo that night, and got Chad Smith from the Red Hot Chili Peppers to play drums, creating an organic rock-meets-hip-hop masterpiece.","artist_info":"Post Malone (born Austin Richard Post) is an American singer, rapper, and songwriter whose genre-fluid artistry spans hip-hop, pop, rock, and country. His ability to collaborate authentically across genres — from Ozzy Osbourne to The Weeknd — has made him one of the most versatile artists of his generation.","artist_history":"Post Malone rose to fame with 'White Iverson' in 2015 and has since released multiple #1 albums. Hollywood's Bleeding (2019) cemented his status as a mainstream force, and his collaborations with rock legends like Ozzy Osbourne showcase his lifelong love of guitar-driven music alongside his hip-hop roots.","cool_facts":["The song gave Ozzy Osbourne his first top-10 hit in 30 years, debuting at #8 on the Hot 100","Chad Smith from Red Hot Chili Peppers played drums on the track","Post Malone has been a huge Ozzy fan since childhood — co-producer Louis Bell said it was 'a dream come true for him'"],"tragedy_or_meaning":"\"Take What You Want\" is a raw expression of heartbreak and anger — the aftermath of being used and discarded by someone you loved. The pairing of Post Malone's vulnerability with Ozzy Osbourne's legendary gravitas creates something timeless, bridging generations of music fans who understand that pain sounds the same whether it's 1979 or 2019.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/6/6a/Lost_In_the_Fire_Gesaffelstein_Single_Cover.png","artist_origin":"Grapevine, Texas, USA","track_made_in":"Los Angeles, California, USA"},{"id":33,"title":"Fall","artist":"Eminem","album":"Kamikaze","year":2018,"listens":123,"duration":"4:22","song_history":"\"Fall\" was released as the first single from Eminem's surprise album 'Kamikaze' on August 31, 2018. The track features uncredited vocals from Justin Vernon (Bon Iver), and represents Eminem returning to form with a diss track aimed at critics who questioned his greatness. Pitchfork noted his flow 'sounds better than it has in years, nodding to his broiling verses of the early aughts.'","artist_info":"Eminem (born Marshall Bruce Mathers III) is an American rapper, songwriter, and record producer from Detroit, Michigan. Widely regarded as one of the greatest MCs of all time, he's known for his technical skill, complex rhyme schemes, and ability to channel raw emotion into his lyrics.","artist_history":"Eminem rose to fame in 1999 with The Slim Shady LP and became the best-selling artist of the 2000s. He broke a 36-year UK chart record with Kamikaze as his ninth consecutive #1 album, a run stretching back 18 years to The Marshall Mathers LP, surpassing records held by Abba and Led Zeppelin.","cool_facts":["Kamikaze was a surprise release with no prior announcement — Eminem tweeted 'Tried not 2 overthink this 1' with the link","Justin Vernon (Bon Iver) featured on the track but later expressed he didn't approve of certain lyrical content","The album cover is a reference to the Beastie Boys' Licensed to Ill"],"tragedy_or_meaning":"\"Fall\" is Eminem at his most defensive and vulnerable simultaneously — a man who built a legacy questioning whether it still matters. The song captures the fear of irrelevance that every great artist faces, channeled into razor-sharp bars that prove the very point he's making: that the fire never truly goes out.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/3/33/Yelawolf-Love-Story-Album-Cover.jpg","artist_origin":"Detroit, Michigan, USA","track_made_in":"Detroit, Michigan, USA"},{"id":34,"title":"Hanging On (Edit)","artist":"Ellie Goulding","album":"Halcyon","year":2012,"listens":122,"duration":"3:22","song_history":"\"Hanging On\" is a cover of Active Child's 2011 song from his album 'You Are All I See.' Ellie Goulding recorded her version for her second studio album 'Halcyon' (2012). Active Child's Pat Grossi was impressed with her interpretation, calling it 'an incredibly proud moment for me as an artist.' An alternative version featuring Tinie Tempah was released as a promotional single.","artist_info":"Ellie Goulding (born Elena Jane Goulding, December 30, 1986) is an English singer-songwriter from Herefordshire, England. Known for her ethereal voice and electronic-pop sound, she has achieved significant commercial success with multiple UK #1 albums and international chart hits.","artist_history":"Ellie Goulding started writing songs at age 15, released her debut single in 2009, and saw her first album 'Lights' go straight to #1 on the UK Albums Chart in 2010. Her career has spanned multiple reinventions, from folk-tinged electronica to dance-pop anthems like 'Burn' and 'Love Me Like You Do,' while also being recognized for environmental activism.","cool_facts":["The original 'Hanging On' was written by Active Child (Pat Grossi) — an American electronic-meets-choral artist","Ellie Goulding performed at Prince William and Kate Middleton's royal wedding reception in 2011","Her album Halcyon and its reissue Halcyon Days produced multiple hit singles and solidified her as a global pop star"],"tragedy_or_meaning":"\"Hanging On\" explores the desperate grip we maintain on things that may already be slipping away — relationships, hope, youth. The song's intensity comes from that universal feeling of knowing you should let go but being unable to, and Ellie's ethereal vocals give the struggle an almost spiritual quality.","artwork_url":"https://upload.wikimedia.org/wikipedia/en/0/09/Theory_of_a_Deadman_-_Rx_%28Medicate%29.png","artist_origin":"Herefo
